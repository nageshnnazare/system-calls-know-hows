<h3 id="tcp-client-example">TCP Client Example</h3>
<pre><code class="language-c">#include &lt;sys/socket.h&gt;
#include &lt;netinet/in.h&gt;
#include &lt;arpa/inet.h&gt;
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;
#include &lt;unistd.h&gt;

#define PORT 8080

int main() {
    int sock;
    struct sockaddr_in server_addr;
    char buffer[1024];
    const char *message = &quot;Hello from client!&quot;;

    // 1. Create socket
    sock = socket(AF_INET, SOCK_STREAM, 0);
    if (sock == -1) {
        perror(&quot;socket&quot;);
        exit(1);
    }

    // 2. Set up server address
    memset(&amp;server_addr, 0, sizeof(server_addr));
    server_addr.sin_family = AF_INET;
    server_addr.sin_port = htons(PORT);

    // Convert IP address
    if (inet_pton(AF_INET, &quot;127.0.0.1&quot;, &amp;server_addr.sin_addr) &lt;= 0) {
        perror(&quot;inet_pton&quot;);
        close(sock);
        exit(1);
    }

    // 3. Connect to server
    if (connect(sock, (struct sockaddr *)&amp;server_addr, 
                sizeof(server_addr)) == -1) {
        perror(&quot;connect&quot;);
        close(sock);
        exit(1);
    }

    printf(&quot;Connected to server\\n&quot;);

    // 4. Send data
    send(sock, message, strlen(message), 0);
    printf(&quot;Message sent: %s\\n&quot;, message);

    // 5. Receive response
    ssize_t bytes_read = recv(sock, buffer, sizeof(buffer) - 1, 0);
    if (bytes_read &gt; 0) {
        buffer[bytes_read] = '\\0';
        printf(&quot;Server response: %s\\n&quot;, buffer);
    }

    // 6. Close socket
    close(sock);

    return 0;
}
</code></pre>
<h2 id="2-udp-communication">2. UDP Communication</h2>
<h3 id="udp-server-example">UDP Server Example</h3>
<pre><code class="language-c">#include &lt;sys/socket.h&gt;
#include &lt;netinet/in.h&gt;
#include &lt;arpa/inet.h&gt;
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;
#include &lt;unistd.h&gt;

#define PORT 8080

int main() {
    int sockfd;
    struct sockaddr_in server_addr, client_addr;
    socklen_t client_len;
    char buffer[1024];

    // Create UDP socket
    sockfd = socket(AF_INET, SOCK_DGRAM, 0);
    if (sockfd == -1) {
        perror(&quot;socket&quot;);
        return 1;
    }

    // Bind to address
    memset(&amp;server_addr, 0, sizeof(server_addr));
    server_addr.sin_family = AF_INET;
    server_addr.sin_addr.s_addr = INADDR_ANY;
    server_addr.sin_port = htons(PORT);

    if (bind(sockfd, (struct sockaddr *)&amp;server_addr, 
             sizeof(server_addr)) == -1) {
        perror(&quot;bind&quot;);
        close(sockfd);
        return 1;
    }

    printf(&quot;UDP server listening on port %d\\n&quot;, PORT);

    while (1) {
        client_len = sizeof(client_addr);

        // Receive datagram
        ssize_t n = recvfrom(sockfd, buffer, sizeof(buffer) - 1, 0,
                            (struct sockaddr *)&amp;client_addr, &amp;client_len);

        if (n &gt; 0) {
            buffer[n] = '\\0';

            char client_ip[INET_ADDRSTRLEN];
            inet_ntop(AF_INET, &amp;client_addr.sin_addr, 
                     client_ip, sizeof(client_ip));

            printf(&quot;Received from %s:%d: %s\\n&quot;, 
                   client_ip, ntohs(client_addr.sin_port), buffer);

            // Send reply
            sendto(sockfd, &quot;ACK&quot;, 3, 0,
                   (struct sockaddr *)&amp;client_addr, client_len);
        }
    }

    close(sockfd);
    return 0;
}
</code></pre>
<h3 id="udp-client-example">UDP Client Example</h3>

<h2 id="4-socket-options">4. Socket Options</h2>
<h3 id="common-socket-options">Common Socket Options</h3>
<pre><code class="language-c">#include &lt;sys/socket.h&gt;
#include &lt;netinet/in.h&gt;
#include &lt;netinet/tcp.h&gt;

int sockfd = socket(AF_INET, SOCK_STREAM, 0);

// SO_REUSEADDR - Reuse address immediately
int opt = 1;
setsockopt(sockfd, SOL_SOCKET, SO_REUSEADDR, &amp;opt, sizeof(opt));

// SO_REUSEPORT - Multiple sockets on same port
setsockopt(sockfd, SOL_SOCKET, SO_REUSEPORT, &amp;opt, sizeof(opt));

// SO_KEEPALIVE - Keep connection alive
setsockopt(sockfd, SOL_SOCKET, SO_KEEPALIVE, &amp;opt, sizeof(opt));

// SO_RCVBUF - Receive buffer size
int bufsize = 65536;
setsockopt(sockfd, SOL_SOCKET, SO_RCVBUF, &amp;bufsize, sizeof(bufsize));

// SO_SNDBUF - Send buffer size
setsockopt(sockfd, SOL_SOCKET, SO_SNDBUF, &amp;bufsize, sizeof(bufsize));

// SO_RCVTIMEO - Receive timeout
struct timeval tv = {.tv_sec = 5, .tv_usec = 0};
setsockopt(sockfd, SOL_SOCKET, SO_RCVTIMEO, &amp;tv, sizeof(tv));

// SO_SNDTIMEO - Send timeout
setsockopt(sockfd, SOL_SOCKET, SO_SNDTIMEO, &amp;tv, sizeof(tv));

// TCP_NODELAY - Disable Nagle's algorithm
setsockopt(sockfd, IPPROTO_TCP, TCP_NODELAY, &amp;opt, sizeof(opt));

// TCP_CORK - Cork TCP (batch small packets)
setsockopt(sockfd, IPPROTO_TCP, TCP_CORK, &amp;opt, sizeof(opt));

// SO_LINGER - Control close() behavior
struct linger ling = {.l_onoff = 1, .l_linger = 10};
setsockopt(sockfd, SOL_SOCKET, SO_LINGER, &amp;ling, sizeof(ling));

// Get socket error
int error;
socklen_t len = sizeof(error);
getsockopt(sockfd, SOL_SOCKET, SO_ERROR, &amp;error, &amp;len);
if (error) {
    printf(&quot;Socket error: %d\\n&quot;, error);
}
</code></pre>
<h2 id="5-non-blocking-sockets">5. Non-Blocking Sockets</h2>
<h3 id="non-blocking-io">Non-Blocking I/O</h3>
<pre><code class="language-c">#include &lt;fcntl.h&gt;
#include &lt;errno.h&gt;

int sockfd = socket(AF_INET, SOCK_STREAM, 0);

// Make socket non-blocking
int flags = fcntl(sockfd, F_GETFL, 0);
fcntl(sockfd, F_SETFL, flags | O_NONBLOCK);

// Non-blocking connect
if (connect(sockfd, (struct sockaddr *)&amp;addr, sizeof(addr)) == -1) {
    if (errno == EINPROGRESS) {
        printf(&quot;Connection in progress...\\n&quot;);

        // Use select() or poll() to wait for completion
        fd_set writefds;
        FD_ZERO(&amp;writefds);
        FD_SET(sockfd, &amp;writefds);

        struct timeval timeout = {.tv_sec = 5, .tv_usec = 0};

        if (select(sockfd + 1, NULL, &amp;writefds, NULL, &amp;timeout) &gt; 0) {
            int error;
            socklen_t len = sizeof(error);
            getsockopt(sockfd, SOL_SOCKET, SO_ERROR, &amp;error, &amp;len);

            if (error == 0) {
                printf(&quot;Connected!\\n&quot;);
            } else {
                printf(&quot;Connection failed: %d\\n&quot;, error);
            }
        }
    }
}

// Non-blocking recv
ssize_t n = recv(sockfd, buffer, sizeof(buffer), 0);
if (n == -1) {
    if (errno == EAGAIN || errno == EWOULDBLOCK) {
        printf(&quot;Would block - no data available\\n&quot;);
    } else {
        perror(&quot;recv&quot;);
    }
}
</code></pre>

<h3 id="connection-pool">Connection Pool</h3>
<pre><code class="language-c">#define POOL_SIZE 10

struct connection_pool {
    int fds[POOL_SIZE];
    int available[POOL_SIZE];
    pthread_mutex_t mutex;
};

void pool_init(struct connection_pool *pool) {
    pthread_mutex_init(&amp;pool-&gt;mutex, NULL);

    for (int i = 0; i &lt; POOL_SIZE; i++) {
        pool-&gt;fds[i] = socket(AF_INET, SOCK_STREAM, 0);
        // connect to server...
        pool-&gt;available[i] = 1;
    }
}

int pool_get(struct connection_pool *pool) {
    pthread_mutex_lock(&amp;pool-&gt;mutex);

    for (int i = 0; i &lt; POOL_SIZE; i++) {
        if (pool-&gt;available[i]) {
            pool-&gt;available[i] = 0;
            pthread_mutex_unlock(&amp;pool-&gt;mutex);
            return pool-&gt;fds[i];
        }
    }

    pthread_mutex_unlock(&amp;pool-&gt;mutex);
    return -1;  // No available connections
}

void pool_release(struct connection_pool *pool, int fd) {
    pthread_mutex_lock(&amp;pool-&gt;mutex);

    for (int i = 0; i &lt; POOL_SIZE; i++) {
        if (pool-&gt;fds[i] == fd) {
            pool-&gt;available[i] = 1;
            break;
        }
    }

    pthread_mutex_unlock(&amp;pool-&gt;mutex);
}
</code></pre>

<h2 id="common-pitfalls">Common Pitfalls</h2>
<ol>
<li><strong>Not checking return values</strong> - Always check for -1</li>
<li><strong>Forgetting byte order</strong> - Use htons(), ntohs(), htonl(), ntohl()</li>
<li><strong>Not handling partial sends/receives</strong> - Loop until complete</li>
<li><strong>Zombie connections</strong> - Use SO_KEEPALIVE or application-level heartbeats</li>
<li><strong>Buffer overflows</strong> - Always bounds-check</li>
<li><strong>Not closing sockets</strong> - Resource leaks</li>
<li><strong>Ignoring SIGPIPE</strong> - Writing to closed socket crashes program</li>
<li><strong>Mixing IPv4 and IPv6</strong> - Use getaddrinfo() for protocol-independent code</li>
</ol>
<h2 id="best-practices">Best Practices</h2>
<pre><code class="language-c">1. ✓ Use SO_REUSEADDR for servers
2. ✓ Set timeouts on blocking operations
3. ✓ Handle EINTR (interrupted system calls)
4. ✓ Check for partial reads/writes
5. ✓ Use non-blocking I/O with select/poll/epoll for scalability
6. ✓ Implement proper error handling
7. ✓ Close sockets in all error paths
8. ✓ Use connection pooling for clients
9. ✓ Implement graceful shutdown
10. ✓ Monitor socket buffer sizes
</code></pre>

<h2 id="overview">Overview</h2>
<p>POSIX threads (pthreads) provide a standardized API for creating and managing threads within a process. Threads share the same memory space but execute independently.</p>
<h2 id="thread-architecture">Thread Architecture</h2>
<pre><code>┌─────────────────────────────────────────────────────────┐
│                    Process                              │
│                                                         │
│  ┌────────────────────────────────────────────────────┐ │
│  │  Shared Resources                                  │ │
│  │  ┌──────────────────────────────────────────────┐  │ │
│  │  │ Code Segment (Text)                          │  │ │
│  │  │ Data Segment (Global/Static variables)       │  │ │
│  │  │ Heap (malloc allocations)                    │  │ │
│  │  │ File Descriptors                             │  │ │
│  │  │ Signal Handlers                              │  │ │
│  │  └──────────────────────────────────────────────┘  │ │
│  └────────────────────────────────────────────────────┘ │
│                                                         │
│  Thread 1           Thread 2           Thread 3         │
│  ┌──────────┐       ┌──────────┐      ┌──────────┐      │
│  │ Stack    │       │ Stack    │      │ Stack    │      │
│  │ Registers│       │ Registers│      │ Registers│      │
│  │ PC       │       │ PC       │      │ PC       │      │
│  │ TID      │       │ TID      │      │ TID      │      │
│  └──────────┘       └──────────┘      └──────────┘      │
│      ▼                  ▼                  ▼            │
│  [Running]          [Ready]            [Blocked]        │
└─────────────────────────────────────────────────────────┘

Threads vs Processes:
┌────────────────────┬──────────────────┬──────────────────┐
│ Feature            │ Thread           │ Process          │
├────────────────────┼──────────────────┼──────────────────┤
│ Memory Space       │ Shared           │ Separate         │
│ Creation Overhead  │ Low              │ High             │
│ Context Switch     │ Fast             │ Slow             │
│ Communication      │ Easy (memory)    │ IPC needed       │
│ Isolation          │ None             │ Strong           │
│ Resource Usage     │ Light            │ Heavy            │
└────────────────────┴──────────────────┴──────────────────┘
</code></pre>
<h2 id="1-thread-creation-and-termination">1. Thread Creation and Termination</h2>
<h3 id="pthread_create---create-thread">pthread_create() - Create Thread</h3>
<pre><code class="language-c">#include &lt;pthread.h&gt;

int pthread_create(pthread_t *thread,
                   const pthread_attr_t *attr,
                   void *(*start_routine)(void *),
                   void *arg);
</code></pre>
<p><strong>Basic Example</strong></p>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;
#include &lt;unistd.h&gt;

void *thread_function(void *arg) {
    int id = *(int *)arg;
    printf(&quot;Thread %d: Hello from thread!\\n&quot;, id);
    sleep(1);
    printf(&quot;Thread %d: Exiting\\n&quot;, id);
    return NULL;
}

int main() {
    pthread_t thread;
    int thread_id = 1;

    if (pthread_create(&amp;thread, NULL, thread_function, &amp;thread_id) != 0) {
        perror(&quot;pthread_create&quot;);
        return 1;
    }

    printf(&quot;Main: Created thread\\n&quot;);

    // Wait for thread to finish
    pthread_join(thread, NULL);

    printf(&quot;Main: Thread completed\\n&quot;);
    return 0;
}
</code></pre>
<p><strong>Multiple Threads</strong></p>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;

#define NUM_THREADS 5

void *worker(void *arg) {
    long id = (long)arg;
    printf(&quot;Thread %ld starting\\n&quot;, id);
    sleep(1);
    printf(&quot;Thread %ld finishing\\n&quot;, id);
    return (void *)(id * 2);
}

int main() {
    pthread_t threads[NUM_THREADS];

    // Create threads
    for (long i = 0; i &lt; NUM_THREADS; i++) {
        if (pthread_create(&amp;threads[i], NULL, worker, (void *)i) != 0) {
            perror(&quot;pthread_create&quot;);
            return 1;
        }
    }

    // Wait for all threads
    for (int i = 0; i &lt; NUM_THREADS; i++) {
        void *result;
        pthread_join(threads[i], &amp;result);
        printf(&quot;Thread %d returned: %ld\\n&quot;, i, (long)result);
    }

    return 0;
}
</code></pre>
<h3 id="pthread_exit---terminate-thread">pthread_exit() - Terminate Thread</h3>
<pre><code class="language-c">#include &lt;pthread.h&gt;

void *thread_function(void *arg) {
    printf(&quot;Thread doing work\\n&quot;);

    // Exit thread with return value
    pthread_exit((void *)42);

    // This code is never reached
    printf(&quot;Never printed\\n&quot;);
    return NULL;
}
</code></pre>
<h3 id="pthread_join---wait-for-thread">pthread_join() - Wait for Thread</h3>
<pre><code class="language-c">#include &lt;pthread.h&gt;

int main() {
    pthread_t thread;
    void *result;

    pthread_create(&amp;thread, NULL, thread_function, NULL);

    // Block until thread terminates
    if (pthread_join(thread, &amp;result) != 0) {
        perror(&quot;pthread_join&quot;);
        return 1;
    }

    printf(&quot;Thread returned: %ld\\n&quot;, (long)result);
    return 0;
}
</code></pre>
<h3 id="pthread_detach---detached-thread">pthread_detach() - Detached Thread</h3>
<pre><code class="language-c">#include &lt;pthread.h&gt;

void *detached_thread(void *arg) {
    printf(&quot;Detached thread running\\n&quot;);
    sleep(2);
    printf(&quot;Detached thread exiting\\n&quot;);
    return NULL;
}

int main() {
    pthread_t thread;

    pthread_create(&amp;thread, NULL, detached_thread, NULL);

    // Detach thread - no need to join
    pthread_detach(thread);

    sleep(3);  // Keep main alive

<h2 id="2-thread-synchronization---mutexes">2. Thread Synchronization - Mutexes</h2>
<h3 id="pthread_mutex_t---mutual-exclusion-lock">pthread_mutex_t - Mutual Exclusion Lock</h3>
<pre><code>Without Mutex (Race Condition):
Thread 1                    Thread 2
  read counter (0)            read counter (0)
  increment (1)               increment (1)
  write counter (1)           write counter (1)
Result: counter = 1 (should be 2!)

With Mutex:
Thread 1                    Thread 2
  lock mutex                  [blocked waiting]
  read counter (0)            [waiting...]
  increment (1)               [waiting...]
  write counter (1)           [waiting...]
  unlock mutex                lock mutex
                              read counter (1)
                              increment (2)
                              write counter (2)
                              unlock mutex
Result: counter = 2 (correct!)
</code></pre>
<p><strong>Basic Mutex Example</strong></p>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;

pthread_mutex_t mutex = PTHREAD_MUTEX_INITIALIZER;
int shared_counter = 0;

void *increment(void *arg) {
    for (int i = 0; i &lt; 100000; i++) {
        pthread_mutex_lock(&amp;mutex);
        shared_counter++;
        pthread_mutex_unlock(&amp;mutex);
    }
    return NULL;
}

int main() {
    pthread_t t1, t2;

    pthread_create(&amp;t1, NULL, increment, NULL);
    pthread_create(&amp;t2, NULL, increment, NULL);

    pthread_join(t1, NULL);
    pthread_join(t2, NULL);

    printf(&quot;Counter: %d (expected: 200000)\\n&quot;, shared_counter);

    pthread_mutex_destroy(&amp;mutex);
    return 0;
}
</code></pre>
<p><strong>Dynamic Mutex Initialization</strong></p>
<pre><code class="language-c">#include &lt;pthread.h&gt;

pthread_mutex_t mutex;

int main() {
    // Initialize mutex
    if (pthread_mutex_init(&amp;mutex, NULL) != 0) {
        perror(&quot;pthread_mutex_init&quot;);
        return 1;
    }

    // Use mutex
    pthread_mutex_lock(&amp;mutex);
    // Critical section
    pthread_mutex_unlock(&amp;mutex);

    // Destroy mutex
    pthread_mutex_destroy(&amp;mutex);

    return 0;
}
</code></pre>
<p><strong>Trylock and Timedlock</strong></p>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;time.h&gt;
#include &lt;errno.h&gt;

pthread_mutex_t mutex = PTHREAD_MUTEX_INITIALIZER;

void *thread_func(void *arg) {
    // Try to lock without blocking
    if (pthread_mutex_trylock(&amp;mutex) == 0) {
        printf(&quot;Lock acquired\\n&quot;);
        // Critical section
        pthread_mutex_unlock(&amp;mutex);
    } else {
        printf(&quot;Lock busy, skipping\\n&quot;);
    }

    // Timed lock (5 seconds)
    struct timespec timeout;
    clock_gettime(CLOCK_REALTIME, &amp;timeout);
    timeout.tv_sec += 5;

    int ret = pthread_mutex_timedlock(&amp;mutex, &amp;timeout);
    if (ret == 0) {
        printf(&quot;Timed lock acquired\\n&quot;);
        pthread_mutex_unlock(&amp;mutex);
    } else if (ret == ETIMEDOUT) {
        printf(&quot;Timed out waiting for lock\\n&quot;);
    }

    return NULL;
}
</code></pre>
<h2 id="3-condition-variables">3. Condition Variables</h2>
<h3 id="pthread_cond_t---thread-synchronization">pthread_cond_t - Thread Synchronization</h3>
<pre><code>Condition Variable Pattern:

Producer Thread:
  lock(mutex)
  add_item_to_buffer()
  signal(cond)     ← Wake up waiting consumer
  unlock(mutex)

Consumer Thread:
  lock(mutex)
  while (buffer_empty())
    wait(cond, mutex)  ← Release mutex and sleep
                       ← When signaled, reacquire mutex
  remove_item_from_buffer()
  unlock(mutex)
</code></pre>
<p><strong>Producer-Consumer with Condition Variables</strong></p>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;

#define BUFFER_SIZE 10

int buffer[BUFFER_SIZE];
int count = 0;
int in = 0;
int out = 0;

pthread_mutex_t mutex = PTHREAD_MUTEX_INITIALIZER;
pthread_cond_t not_empty = PTHREAD_COND_INITIALIZER;
pthread_cond_t not_full = PTHREAD_COND_INITIALIZER;

void *producer(void *arg) {
    for (int i = 0; i &lt; 20; i++) {
        pthread_mutex_lock(&amp;mutex);

        // Wait while buffer is full
        while (count == BUFFER_SIZE) {
            pthread_cond_wait(&amp;not_full, &amp;mutex);
        }

        // Produce item
        buffer[in] = i;
        in = (in + 1) % BUFFER_SIZE;
        count++;
        printf(&quot;Produced: %d (count: %d)\\n&quot;, i, count);

        // Signal consumer
        pthread_cond_signal(&amp;not_empty);

        pthread_mutex_unlock(&amp;mutex);
        usleep(100000);
    }
    return NULL;
}

void *consumer(void *arg) {
    for (int i = 0; i &lt; 20; i++) {
        pthread_mutex_lock(&amp;mutex);

        // Wait while buffer is empty
        while (count == 0) {
            pthread_cond_wait(&amp;not_empty, &amp;mutex);
        }

        // Consume item
        int item = buffer[out];
        out = (out + 1) % BUFFER_SIZE;
        count--;
        printf(&quot;Consumed: %d (count: %d)\\n&quot;, item, count);

        // Signal producer
        pthread_cond_signal(&amp;not_full);

        pthread_mutex_unlock(&amp;mutex);
        usleep(150000);
    }
    return NULL;
}

int main() {
    pthread_t prod, cons;

    pthread_create(&amp;prod, NULL, producer, NULL);
    pthread_create(&amp;cons, NULL, consumer, NULL);

    pthread_join(prod, NULL);
    pthread_join(cons, NULL);

    pthread_mutex_destroy(&amp;mutex);
    pthread_cond_destroy(&amp;not_empty);
    pthread_cond_destroy(&amp;not_full);

    return 0;
}
</code></pre>
<p><strong>Broadcast vs Signal</strong></p>
<pre><code class="language-c">#include &lt;pthread.h&gt;

pthread_cond_t cond = PTHREAD_COND_INITIALIZER;
pthread_mutex_t mutex = PTHREAD_MUTEX_INITIALIZER;
int ready = 0;

void *waiter(void *arg) {
    pthread_mutex_lock(&amp;mutex);

    while (!ready) {
        pthread_cond_wait(&amp;cond, &amp;mutex);
    }

    printf(&quot;Thread %ld woke up\\n&quot;, (long)arg);

    pthread_mutex_unlock(&amp;mutex);
    return NULL;
}

int main() {
    pthread_t threads[5];

    // Create waiting threads
    for (long i = 0; i &lt; 5; i++) {
        pthread_create(&amp;threads[i], NULL, waiter, (void *)i);
    }

    sleep(1);

    pthread_mutex_lock(&amp;mutex);
    ready = 1;

    // pthread_cond_signal(&amp;cond);    // Wakes ONE thread
    pthread_cond_broadcast(&amp;cond);    // Wakes ALL threads

    pthread_mutex_unlock(&amp;mutex);

    for (int i = 0; i &lt; 5; i++) {
        pthread_join(threads[i], NULL);
    }

    return 0;
}
</code></pre>
<h2 id="4-read-write-locks">4. Read-Write Locks</h2>
<h3 id="pthread_rwlock_t---multiple-readers-single-writer">pthread_rwlock_t - Multiple Readers, Single Writer</h3>
<pre><code>Read-Write Lock Behavior:

State: Unlocked
  Reader 1 locks  → State: Read locked (count=1)
  Reader 2 locks  → State: Read locked (count=2)  ✓ Allowed
  Writer waits    → BLOCKED
  Reader 3 locks  → State: Read locked (count=3)  ✓ Allowed
  Reader 1 unlocks → State: Read locked (count=2)
  Reader 2 unlocks → State: Read locked (count=1)
  Reader 3 unlocks → State: Unlocked
  Writer locks    → State: Write locked           ✓ Exclusive

┌────────────────┬──────────────┬──────────────┐
│ Lock State     │ Reader       │ Writer       │
├────────────────┼──────────────┼──────────────┤
│ Unlocked       │ Grant        │ Grant        │
│ Read Locked    │ Grant        │ Block        │
│ Write Locked   │ Block        │ Block        │
└────────────────┴──────────────┴──────────────┘
</code></pre>
<p><strong>Example</strong></p>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;

pthread_rwlock_t rwlock = PTHREAD_RWLOCK_INITIALIZER;
int shared_data = 0;

void *reader(void *arg) {
    long id = (long)arg;

    for (int i = 0; i &lt; 5; i++) {
        pthread_rwlock_rdlock(&amp;rwlock);

        printf(&quot;Reader %ld: data = %d\\n&quot;, id, shared_data);
        usleep(100000);

        pthread_rwlock_unlock(&amp;rwlock);
        usleep(50000);
    }

    return NULL;
}

void *writer(void *arg) {
    long id = (long)arg;

    for (int i = 0; i &lt; 3; i++) {
        pthread_rwlock_wrlock(&amp;rwlock);

        shared_data++;
        printf(&quot;Writer %ld: wrote %d\\n&quot;, id, shared_data);
        usleep(200000);

        pthread_rwlock_unlock(&amp;rwlock);
        usleep(100000);
    }

    return NULL;
}

int main() {
    pthread_t readers[3], writers[2];

    // Create writers
    for (long i = 0; i &lt; 2; i++) {
        pthread_create(&amp;writers[i], NULL, writer, (void *)i);
    }

    // Create readers
    for (long i = 0; i &lt; 3; i++) {
        pthread_create(&amp;readers[i], NULL, reader, (void *)i);
    }

    // Wait for all
    for (int i = 0; i &lt; 2; i++) {
        pthread_join(writers[i], NULL);
    }
    for (int i = 0; i &lt; 3; i++) {
        pthread_join(readers[i], NULL);
    }

    pthread_rwlock_destroy(&amp;rwlock);
    return 0;
}
</code></pre>
<p><strong>Trylock and Timedlock</strong></p>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;time.h&gt;

pthread_rwlock_t rwlock = PTHREAD_RWLOCK_INITIALIZER;

void *thread_func(void *arg) {
    // Try read lock
    if (pthread_rwlock_tryrdlock(&amp;rwlock) == 0) {
        printf(&quot;Read lock acquired\\n&quot;);
        pthread_rwlock_unlock(&amp;rwlock);
    }

    // Try write lock
    if (pthread_rwlock_trywrlock(&amp;rwlock) == 0) {
        printf(&quot;Write lock acquired\\n&quot;);
        pthread_rwlock_unlock(&amp;rwlock);
    }

    // Timed read lock
    struct timespec timeout;
    clock_gettime(CLOCK_REALTIME, &amp;timeout);
    timeout.tv_sec += 5;

    if (pthread_rwlock_timedrdlock(&amp;rwlock, &amp;timeout) == 0) {
        printf(&quot;Timed read lock acquired\\n&quot;);
        pthread_rwlock_unlock(&amp;rwlock);
    }

    return NULL;
}
</code></pre>
<h2 id="5-barriers">5. Barriers</h2>
<h3 id="pthread_barrier_t---synchronization-point">pthread_barrier_t - Synchronization Point</h3>
<pre><code>Barrier Synchronization:

Thread 1: ──────────────────────►├─ barrier ─┤► Continue
Thread 2: ──────►├─ barrier ─┤ (wait)       ├► Continue
Thread 3: ────────────►├─ barrier ─┤ (wait)  ├► Continue

All threads must reach barrier before any can continue
</code></pre>
<p><strong>Example</strong></p>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;

#define NUM_THREADS 5

pthread_barrier_t barrier;

void *worker(void *arg) {
    long id = (long)arg;

    printf(&quot;Thread %ld: Phase 1\\n&quot;, id);
    sleep(id);  // Different work times

    // Wait for all threads to complete phase 1
    printf(&quot;Thread %ld: Waiting at barrier\\n&quot;, id);
    pthread_barrier_wait(&amp;barrier);

    printf(&quot;Thread %ld: Phase 2 (all synchronized)\\n&quot;, id);

    return NULL;
}

int main() {
    pthread_t threads[NUM_THREADS];

    // Initialize barrier for NUM_THREADS threads
    pthread_barrier_init(&amp;barrier, NULL, NUM_THREADS);

    for (long i = 0; i &lt; NUM_THREADS; i++) {
        pthread_create(&amp;threads[i], NULL, worker, (void *)i);
    }

    for (int i = 0; i &lt; NUM_THREADS; i++) {
        pthread_join(threads[i], NULL);
    }

    pthread_barrier_destroy(&amp;barrier);
    return 0;
}
</code></pre>
<h2 id="6-spin-locks">6. Spin Locks</h2>
<h3 id="pthread_spinlock_t---busy-wait-lock">pthread_spinlock_t - Busy-Wait Lock</h3>
<pre><code>Mutex vs Spinlock:

Mutex (blocks thread):
  Thread tries lock
  Lock busy → Thread sleeps (context switch)
  Lock available → Wake up thread (context switch)
  Good for: Long critical sections

Spinlock (busy-wait):
  Thread tries lock
  Lock busy → Thread spins in loop checking lock
  Lock available → Acquire immediately
  Good for: Very short critical sections, real-time systems
</code></pre>
<p><strong>Example</strong></p>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;

pthread_spinlock_t spinlock;
int counter = 0;

void *increment(void *arg) {
    for (int i = 0; i &lt; 100000; i++) {
        pthread_spin_lock(&amp;spinlock);
        counter++;
        pthread_spin_unlock(&amp;spinlock);
    }
    return NULL;
}

int main() {
    pthread_t t1, t2;

    // PTHREAD_PROCESS_PRIVATE: only within process
    // PTHREAD_PROCESS_SHARED: shared between processes
    pthread_spin_init(&amp;spinlock, PTHREAD_PROCESS_PRIVATE);

    pthread_create(&amp;t1, NULL, increment, NULL);
    pthread_create(&amp;t2, NULL, increment, NULL);

    pthread_join(t1, NULL);
    pthread_join(t2, NULL);

    printf(&quot;Counter: %d\\n&quot;, counter);

    pthread_spin_destroy(&amp;spinlock);
    return 0;
}
</code></pre>
<h2 id="7-thread-local-storage">7. Thread-Local Storage</h2>
<h3 id="pthread_key_t---thread-specific-data">pthread_key_t - Thread-Specific Data</h3>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;

    printf(&quot;Destructor called for value: %ld\\n&quot;, (long)value);
    // Free allocated memory if needed
}

    long id = (long)arg;

    // Set thread-specific value
    pthread_setspecific(key, (void *)(id * 100));

    // Get thread-specific value
    long value = (long)pthread_getspecific(key);
    printf(&quot;Thread %ld: my value is %ld\\n&quot;, id, value);

    return NULL;
}

int main() {
    pthread_t threads[3];

    // Create key with destructor
    pthread_key_create(&amp;key, destructor);

    for (long i = 0; i &lt; 3; i++) {
        pthread_create(&amp;threads[i], NULL, thread_func, (void *)i);
    }

    for (int i = 0; i &lt; 3; i++) {
        pthread_join(threads[i], NULL);
    }

    pthread_key_delete(key);
    return 0;
}
</code></pre>

<h2 id="8-thread-attributes">8. Thread Attributes</h2>
<h3 id="pthread_attr_t---customize-thread-behavior">pthread_attr_t - Customize Thread Behavior</h3>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;

void *thread_func(void *arg) {
    printf(&quot;Thread running\\n&quot;);
    return NULL;
}

int main() {
    pthread_t thread;
    pthread_attr_t attr;

    // Initialize attributes
    pthread_attr_init(&amp;attr);

    // Set detached state
    pthread_attr_setdetachstate(&amp;attr, PTHREAD_CREATE_DETACHED);

    // Set stack size (2MB)
    size_t stacksize = 2 * 1024 * 1024;
    pthread_attr_setstacksize(&amp;attr, stacksize);

    // Set scheduling policy
    pthread_attr_setschedpolicy(&amp;attr, SCHED_FIFO);

    // Set priority
    struct sched_param param;
    param.sched_priority = 10;
    pthread_attr_setschedparam(&amp;attr, &amp;param);

    // Set scope
    pthread_attr_setscope(&amp;attr, PTHREAD_SCOPE_SYSTEM);

    // Create thread with attributes
    if (pthread_create(&amp;thread, &amp;attr, thread_func, NULL) != 0) {
        perror(&quot;pthread_create&quot;);
        return 1;
    }

    // Destroy attributes
    pthread_attr_destroy(&amp;attr);

    // No need to join (detached)
    sleep(1);

    return 0;
}
</code></pre>
<h2 id="9-thread-cancellation">9. Thread Cancellation</h2>
<h3 id="pthread_cancel---terminate-thread">pthread_cancel() - Terminate Thread</h3>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;

void cleanup_handler(void *arg) {
    printf(&quot;Cleanup: %s\\n&quot;, (char *)arg);
}

void *thread_func(void *arg) {
    // Push cleanup handler
    pthread_cleanup_push(cleanup_handler, &quot;Resource freed&quot;);

    // Set cancellation type
    pthread_setcanceltype(PTHREAD_CANCEL_ASYNCHRONOUS, NULL);

    for (int i = 0; i &lt; 10; i++) {
        printf(&quot;Thread: iteration %d\\n&quot;, i);
        sleep(1);

        // Cancellation point
        pthread_testcancel();
    }

    // Pop cleanup handler (execute=0: don't execute now)
    pthread_cleanup_pop(0);

    return NULL;
}

int main() {
    pthread_t thread;

    pthread_create(&amp;thread, NULL, thread_func, NULL);

    sleep(3);

    // Cancel thread
    printf(&quot;Main: Canceling thread\\n&quot;);
    pthread_cancel(thread);

    pthread_join(thread, NULL);

    printf(&quot;Main: Thread canceled\\n&quot;);

    return 0;
}
</code></pre>
<h2 id="10-thread-safety-and-synchronization-patterns">10. Thread Safety and Synchronization Patterns</h2>
<h3 id="once-initialization">Once Initialization</h3>
<pre><code class="language-c">#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;

pthread_once_t once_control = PTHREAD_ONCE_INIT;

void init_routine(void) {
    printf(&quot;Initialization executed once\\n&quot;);
    // Initialize shared resources
}

void *thread_func(void *arg) {
    // This ensures init_routine is called exactly once
    pthread_once(&amp;once_control, init_routine);

    printf(&quot;Thread %ld running\\n&quot;, (long)arg);

    return NULL;
}

int main() {
    pthread_t threads[5];

    for (long i = 0; i &lt; 5; i++) {
        pthread_create(&amp;threads[i], NULL, thread_func, (void *)i);
    }

    for (int i = 0; i &lt; 5; i++) {
        pthread_join(threads[i], NULL);
    }

    return 0;
}
</code></pre>
<h3 id="thread-safe-singleton-pattern">Thread-Safe Singleton Pattern</h3>
<pre><code class="language-c">#include &lt;pthread.h&gt;

static pthread_mutex_t mutex = PTHREAD_MUTEX_INITIALIZER;
static int *singleton = NULL;

int *get_singleton() {
    if (singleton == NULL) {
        pthread_mutex_lock(&amp;mutex);
        if (singleton == NULL) {  // Double-checked locking
            singleton = malloc(sizeof(int));
            *singleton = 42;
        }
        pthread_mutex_unlock(&amp;mutex);
    }
    return singleton;
}
</code></pre>

<h2 id="common-pitfalls">Common Pitfalls</h2>
<ol>
<li><strong>Race Conditions</strong> - Always protect shared data with mutexes</li>
<li><strong>Deadlocks</strong> - Acquire locks in consistent order</li>
<li><strong>Forgetting to Join</strong> - Causes resource leaks</li>
<li><strong>Not Using Condition Variables</strong> - Busy-waiting wastes CPU</li>
<li><strong>Mixing Processes and Threads</strong> - fork() with threads is dangerous</li>
<li><strong>Signal Handling</strong> - Signals in multithreaded programs are complex</li>
</ol>
<h2 id="best-practices">Best Practices</h2>
<pre><code class="language-c">1. ✓ Initialize mutexes before use
2. ✓ Always unlock what you lock
3. ✓ Use condition variables for waiting
4. ✓ Join or detach all threads
5. ✓ Minimize critical section size
6. ✓ Use thread-safe functions (e.g., strtok_r vs strtok)
7. ✓ Handle pthread function return values
8. ✓ Use barriers for phase synchronization
9. ✓ Consider read-write locks for reader-heavy workloads
10. ✓ Test thoroughly for race conditions
</code></pre>

    }
    const qIdx = pathPart.indexOf('?');
    if (qIdx >= 0) pathPart = pathPart.substring(0, qIdx);
    if (!pathPart) return null;

    const joined = joinPath(baseDir || '', pathPart).toLowerCase();
    let idx;
    if (/\.md$/i.test(pathPart)) {
        idx = BY_PATH[joined];
        if (idx === undefined) {
            const base = joined.split('/').pop();
            idx = BY_BASENAME[base];
        }
    } else {
        // a directory reference -> that folder's README
        idx = BY_DIR_README[joined];
    }
    if (idx === undefined) return null;
    return { idx: idx, anchor: anchor };
}

function baseDirOf(node) {
    const panel = node && node.closest ? node.closest('.tab-content') : null;
    return panel ? (panel.dataset.dir || '') : '';
}

/* Tag links so we can style internal navigation distinctly from external ones. */
function classifyLinks() {
    document.querySelectorAll('.tab-content a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        if (href.charAt(0) === '#') {
            a.classList.add('anchor-link');
        } else if (mdTarget(href, baseDirOf(a))) {
            a.classList.add('xref-link');
        } else if (/^[a-z][a-z0-9+.-]*:\/\//i.test(href)) {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
        }
    });
}
classifyLinks();

docSelect.addEventListener('change', () => {
    activateTab(parseInt(docSelect.value, 10));
});

/* ───── Syntax highlighting ───── */

function addCopyButton(pre, block) {
    const btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.type = 'button';
    btn.textContent = 'Copy';
    btn.addEventListener('click', () => {
        const text = block.innerText;
        const done = () => {
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
        } else {
            fallbackCopy(text, done);
        }
    });
    pre.appendChild(btn);
}

function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
}

function highlightAllCode() {
    document.querySelectorAll('.tab-content pre code').forEach(block => {
        if (block.dataset.highlighted === '1') return;
        const pre = block.closest('pre');
        const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
        if (langClass) {
            const lang = langClass.replace('language-', '');
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = lang;
            pre.appendChild(label);
        }
        hljs.highlightElement(block);
        addCopyButton(pre, block);
        block.dataset.highlighted = '1';
    });
}

highlightAllCode();

/* ───── Theme toggle ───── */

const HLJS_DARK = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css';
const HLJS_LIGHT = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs.min.css';
const themeToggleBtn = document.getElementById('themeToggle');
const hljsLink = document.getElementById('hljs-theme');

const ICON_SUN = '<svg class="icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-1.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Zm5.657-8.157a.75.75 0 0 1 0 1.061l-1.061 1.06a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734l1.06-1.06a.75.75 0 0 1 1.06 0Zm-9.193 9.193a.75.75 0 0 1 0 1.06l-1.06 1.061a.75.75 0 1 1-1.061-1.06l1.06-1.061a.75.75 0 0 1 1.061 0ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0ZM3 8a.75.75 0 0 1-.75.75H.75a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 3 8Zm13 0a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 16 8Zm-8 5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13Zm3.536-2.464a.75.75 0 0 1 1.06 0l1.061 1.06a.75.75 0 0 1-1.06 1.061l-1.061-1.06a.75.75 0 0 1 0-1.061Zm-8.132 0a.75.75 0 0 1 1.06 1.061l-1.06 1.06a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734Z"></path></svg>';
const ICON_MOON = '<svg class="icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.046-7.046.75.75 0 0 1 .175-.786Zm1.616 1.945a7 7 0 0 1-7.678 7.678 5.499 5.499 0 1 0 7.678-7.678Z"></path></svg>';

function getStoredTheme() {
    try { return localStorage.getItem('doc-theme'); } catch(e) { return null; }
}

function setTheme(theme) {
    document.body.setAttribute('data-theme', theme);
    hljsLink.href = theme === 'light' ? HLJS_LIGHT : HLJS_DARK;
    themeToggleBtn.innerHTML = theme === 'light' ? ICON_SUN : ICON_MOON;
    themeToggleBtn.title = theme === 'light'
        ? 'Switch to dark mode (Ctrl+Shift+L)'
        : 'Switch to light mode (Ctrl+Shift+L)';
    try { localStorage.setItem('doc-theme', theme); } catch(e) {}
}

(function initTheme() {
    const stored = getStoredTheme();
    const theme = (stored === 'light' || stored === 'dark')
        ? stored
        : (document.body.getAttribute('data-theme') || 'dark');
    setTheme(theme);
})();

themeToggleBtn.addEventListener('click', () => {
    const current = document.body.getAttribute('data-theme') || 'dark';
    setTheme(current === 'dark' ? 'light' : 'dark');
});

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'L') {
        e.preventDefault();
        const current = document.body.getAttribute('data-theme') || 'dark';
        setTheme(current === 'dark' ? 'light' : 'dark');
    }
});

/* ───── Tab activation ───── */

function activateTab(idx, resetScroll) {
    if (resetScroll === undefined) resetScroll = true;
    document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + idx).classList.add('active');
    docSelect.value = String(idx);
    docList.querySelectorAll('a').forEach(a => {
        a.classList.toggle('nav-doc-active', parseInt(a.dataset.docIdx, 10) === idx);
    });
    history.replaceState(null, null, '#tab-' + idx);
    if (typeof buildToc === 'function') buildToc(idx);
    // Reflect the active document's title in the condensing navbar.
    if (navDocTitle && TAB_DATA[idx]) {
        navDocTitle.textContent = TAB_DATA[idx].name.replace(/^\s*\d+\.\s*/, '');
    }
    // Jump back to the top when switching documents so the reader starts at
    // the beginning rather than wherever the previous doc was scrolled to.
    if (resetScroll) {
        window.scrollTo({ top: 0, behavior: 'auto' });
        document.body.classList.remove('nav-condensed');
        navLastY = 0;
    }
}

/* ───── Search index: pre-extract plain text per block ───── */

const searchIndex = [];

TAB_DATA.forEach((tab, tabIdx) => {
    const tmp = document.createElement('div');
    tmp.innerHTML = tab.body;
    let currentHeading = '';

    function walk(node) {
        for (const child of node.childNodes) {
            if (child.nodeType === Node.ELEMENT_NODE) {
                const tag = child.tagName;
                if (/^H[1-6]$/.test(tag)) {
                    currentHeading = child.textContent.trim();
                }
                const text = child.textContent.trim();
                if (text.length > 0) {
                    searchIndex.push({
                        tabIdx: tabIdx,
                        tabName: tab.name,
                        heading: currentHeading,
                        text: text,
                        tag: tag
                    });
                }
                if (/^(P|LI|TD|TH|BLOCKQUOTE|PRE|H[1-6])$/.test(tag)) {
                    continue;
                }
                walk(child);
            }
        }
    }
    walk(tmp);
});

/* ───── Search overlay logic ───── */

const overlay = document.getElementById('searchOverlay');
const searchInput = document.getElementById('searchInput');
const searchTrigger = document.getElementById('searchTrigger');
const srBody = document.getElementById('srBody');
const srCount = document.getElementById('srCount');
let srActiveIdx = -1;
let srResults = [];

function openSearch() {
    overlay.classList.add('open');
    searchInput.value = '';
    searchInput.focus();
    srBody.innerHTML = '<div class="sr-empty">Type to search across all tabs</div>';
    srCount.textContent = '';
    srActiveIdx = -1;
    srResults = [];
}

function closeSearch() {
    overlay.classList.remove('open');
    searchInput.value = '';
}

searchTrigger.addEventListener('click', openSearch);

overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeSearch();
});

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (overlay.classList.contains('open')) closeSearch();
        else openSearch();
        return;
    }
    if (e.key === '/' && !overlay.classList.contains('open') &&
        !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
        e.preventDefault();
        openSearch();
        return;
    }
    if (e.key === 'Escape' && overlay.classList.contains('open')) {
        closeSearch();
        return;
    }
    if (overlay.classList.contains('open')) {
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (srResults.length > 0) {
                srActiveIdx = Math.min(srActiveIdx + 1, srResults.length - 1);
                updateActiveResult();
            }
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (srResults.length > 0) {
                srActiveIdx = Math.max(srActiveIdx - 1, 0);
                updateActiveResult();
            }
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (srActiveIdx >= 0 && srActiveIdx < srResults.length) {
                navigateToResult(srResults[srActiveIdx]);
            }
        }
    }
});

function updateActiveResult() {
    srBody.querySelectorAll('.sr-item').forEach((el, i) => {
        el.classList.toggle('sr-active', i === srActiveIdx);
    });
    const active = srBody.querySelector('.sr-active');
    if (active) active.scrollIntoView({ block: 'nearest' });
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function highlightSnippet(text, query, maxLen) {
    const lower = text.toLowerCase();
    const qLower = query.toLowerCase();
    const pos = lower.indexOf(qLower);
    if (pos < 0) return text.substring(0, maxLen);

    const pad = Math.floor((maxLen - query.length) / 2);
    let start = Math.max(0, pos - pad);
    let end = Math.min(text.length, pos + query.length + pad);
    let snippet = text.substring(start, end);
    if (start > 0) snippet = '...' + snippet;
    if (end < text.length) snippet = snippet + '...';

    const re = new RegExp('(' + escapeRegex(query) + ')', 'gi');
    return snippet.replace(re, '<mark>$1</mark>');
}

let searchTimer = null;
searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(runSearch, 120);
});

function runSearch() {
    const query = searchInput.value.trim();
    if (query.length < 2) {
        srBody.innerHTML = '<div class="sr-empty">Type at least 2 characters</div>';
        srCount.textContent = '';
        srResults = [];
        srActiveIdx = -1;
        return;
    }

    const qLower = query.toLowerCase();
    const matches = [];
    const seen = new Set();

    for (const entry of searchIndex) {
        if (entry.text.toLowerCase().includes(qLower)) {
            const key = entry.tabIdx + ':' + entry.heading + ':' + entry.text.substring(0, 80);
            if (seen.has(key)) continue;
            seen.add(key);
            matches.push(entry);
            if (matches.length >= 100) break;
        }
    }

    srResults = matches;
    srActiveIdx = matches.length > 0 ? 0 : -1;

    if (matches.length === 0) {
        srBody.innerHTML = '<div class="sr-empty">No results for "' +
            query.replace(/</g,'&lt;') + '"</div>';
        srCount.textContent = '0 results';
        return;
    }

    srCount.textContent = matches.length >= 100 ? '100+ results' : matches.length + ' result' + (matches.length > 1 ? 's' : '');

    let html = '';
    matches.forEach((m, i) => {
        const snippet = highlightSnippet(m.text, query, 160);
        html += '<div class="sr-item' + (i === 0 ? ' sr-active' : '') + '" data-ridx="' + i + '">';
        html += '<div class="sr-item-tab">' + m.tabName + '</div>';
        if (m.heading) html += '<div class="sr-item-heading">' + m.heading.replace(/</g,'&lt;') + '</div>';
        html += '<div class="sr-item-snippet">' + snippet + '</div>';
        html += '</div>';
    });
    srBody.innerHTML = html;

    srBody.querySelectorAll('.sr-item').forEach(el => {
        el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.ridx, 10);
            navigateToResult(srResults[idx]);
        });
    });
}

function navigateToResult(result) {
    const savedQuery = searchInput.value.trim() || result.text.substring(0, 20);
    closeSearch();
    activateTab(result.tabIdx, false);

    requestAnimationFrame(() => {
        clearHighlights();
        const panel = document.getElementById('panel-' + result.tabIdx);
        const qLower = savedQuery.toLowerCase();
        const qLen = savedQuery.length;

        const hits = [];
        const walker = document.createTreeWalker(panel, NodeFilter.SHOW_TEXT);
        while (walker.nextNode()) {
            const node = walker.currentNode;
            const idx = node.textContent.toLowerCase().indexOf(qLower);
            if (idx >= 0) {
                hits.push({ node: node, offset: idx });
            }
        }

        let firstMark = null;
        for (let i = hits.length - 1; i >= 0; i--) {
            const h = hits[i];
            const range = document.createRange();
            range.setStart(h.node, h.offset);
            range.setEnd(h.node, h.offset + qLen);
            const mark = document.createElement('span');
            mark.className = 'search-highlight';
            mark.dataset.searchHighlight = '1';
            try { range.surroundContents(mark); firstMark = mark; } catch(e) {}
        }

        if (firstMark) {
            firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        setTimeout(clearHighlights, 6000);
    });
}

function clearHighlights() {
    document.querySelectorAll('[data-search-highlight]').forEach(el => {
        const parent = el.parentNode;
        parent.replaceChild(document.createTextNode(el.textContent), el);
        parent.normalize();
    });
}

/* ───── Sidebar TOC + scroll spy ───── */

const sidebarNav = document.getElementById('sidebarNav');
const navList = document.getElementById('navList');
const sidebarToggle = document.getElementById('sidebarToggle');
let currentTocHeadings = [];

function buildToc(panelIdx) {
    navList.innerHTML = '';
    currentTocHeadings = [];
    const panel = document.getElementById('panel-' + panelIdx);
    if (!panel) return;
    const headings = panel.querySelectorAll('h1, h2, h3, h4');
    headings.forEach((h, i) => {
        if (!h.id) h.id = 'autoid-' + panelIdx + '-' + i;
        const level = h.tagName.substring(1);
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        a.className = 'nav-h' + level;
        a.title = h.textContent;
        a.dataset.headingId = h.id;
        a.addEventListener('click', function(e) {
            e.preventDefault();
            h.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        li.appendChild(a);
        navList.appendChild(li);
        currentTocHeadings.push({ el: h, link: a });
    });
    updateScrollSpy();
}

let spyRaf = null;
function updateScrollSpy() {
    if (spyRaf) return;
    spyRaf = requestAnimationFrame(() => {
        spyRaf = null;
        if (currentTocHeadings.length === 0) return;
        const scrollY = window.scrollY;
        const offset = 80;
        let activeEntry = currentTocHeadings[0];
        for (const entry of currentTocHeadings) {
            if (entry.el.offsetTop <= scrollY + offset) {
                activeEntry = entry;
            } else {
                break;
            }
        }
        currentTocHeadings.forEach(e => e.link.classList.remove('nav-active'));
        if (activeEntry) {
            activeEntry.link.classList.add('nav-active');
            const linkTop = activeEntry.link.offsetTop;
            const navH = sidebarNav.clientHeight;
            const navScroll = sidebarNav.scrollTop;
            if (linkTop < navScroll + 40 || linkTop > navScroll + navH - 40) {
                sidebarNav.scrollTo({ top: linkTop - navH / 3, behavior: 'smooth' });
            }
        }
    });
}

window.addEventListener('scroll', updateScrollSpy, { passive: true });

/* ───── iOS-style condensing navbar (hide on scroll down, show on scroll up) ───── */
function updateNavCondense() {
    const y = window.scrollY;
    const NAV_TOP = 8;       // always expanded near the very top
    const NAV_TRIGGER = 72;  // must scroll past this before condensing
    const DELTA = 5;         // ignore tiny jitters
    if (y <= NAV_TOP) {
        document.body.classList.remove('nav-condensed');
    } else if (y > navLastY + DELTA && y > NAV_TRIGGER) {
        document.body.classList.add('nav-condensed');   // scrolling down
    } else if (y < navLastY - DELTA) {
        document.body.classList.remove('nav-condensed'); // scrolling up
    }
    navLastY = y;
}
window.addEventListener('scroll', updateNavCondense, { passive: true });

function toggleSidebar() {
    const collapsed = sidebarNav.classList.toggle('collapsed');
    document.body.classList.toggle('sidebar-collapsed', collapsed);
}

sidebarToggle.addEventListener('click', toggleSidebar);

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'b' && !overlay.classList.contains('open')) {
        e.preventDefault();
        toggleSidebar();
    }
});

/* ───── Anchor + cross-document link interception ───── */

/* Find an element by id, preferring the given panel (heading ids can collide
   across documents because each file is converted independently). */
function findById(id, preferredPanel) {
    if (preferredPanel) {
        const scoped = preferredPanel.querySelector('[id="' + id.replace(/(["\\])/g, '\\$1') + '"]');
        if (scoped) return scoped;
    }
    return document.getElementById(id);
}

function scrollToTarget(target) {
    requestAnimationFrame(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }));
}

function gotoAnchor(idx, anchor) {
    activateTab(idx, !anchor);
    const panel = document.getElementById('panel-' + idx);
    if (anchor) {
        const target = findById(anchor, panel);
        if (target) { scrollToTarget(target); return; }
    }
}

document.addEventListener('click', function(e) {
    const link = e.target.closest('a[href]');
    if (!link) return;
    const href = link.getAttribute('href');
    if (!href) return;

    // In-page anchor: resolve within the panel that owns the link first.
    if (href.charAt(0) === '#') {
        const id = href.substring(1);
        if (!id) return;
        const ownerPanel = link.closest('.tab-content');
        const target = findById(id, ownerPanel);
        if (target) {
            e.preventDefault();
            const dest = target.closest('.tab-content');
            if (dest) {
                const m = dest.id.match(/^panel-(\d+)$/);
                if (m) activateTab(parseInt(m[1], 10), false);
            }
            scrollToTarget(target);
        }
        return;
    }

    // Cross-document link to another bundled doc (file or folder), optionally #anchor.
    const md = mdTarget(href, baseDirOf(link));
    if (md) {
        e.preventDefault();
        gotoAnchor(md.idx, md.anchor);
    }
});

/* ───── Startup ───── */
/* - Nagesh N Nazare - */

const hash = location.hash || '';
const tabMatch = hash.match(/^#tab-(\d+)$/);
if (tabMatch) {
    activateTab(Math.min(parseInt(tabMatch[1], 10), TAB_DATA.length - 1));
} else if (hash.length > 1) {
    const targetId = hash.substring(1);
    const target = document.getElementById(targetId);
    if (target) {
        const panels = document.querySelectorAll('.tab-content');
        for (let i = 0; i < panels.length; i++) {
            if (panels[i].contains(target)) {
                activateTab(i, false);
                requestAnimationFrame(() => {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                break;
            }
        }
    } else {
        activateTab(0);
    }
} else {
    activateTab(0);
}
</script>
