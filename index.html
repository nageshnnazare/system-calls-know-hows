<pre><code class="language-c">/*
 * tcp_server.c - Simple TCP echo server
 * 
 * Compile: gcc -o tcp_server tcp_server.c
 * Usage: ./tcp_server [port]
 * Test: telnet localhost 8080
 */

#include &lt;sys/socket.h&gt;
#include &lt;netinet/in.h&gt;
#include &lt;arpa/inet.h&gt;
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;
#include &lt;unistd.h&gt;
#include &lt;errno.h&gt;

#define DEFAULT_PORT 8080
#define BACKLOG 5
#define BUFFER_SIZE 1024

int main(int argc, char *argv[]) {
    int server_fd, client_fd;
    struct sockaddr_in server_addr, client_addr;
    socklen_t client_len;
    char buffer[BUFFER_SIZE];
    int port = DEFAULT_PORT;

    if (argc &gt; 1) {
        port = atoi(argv[1]);
    }

    printf(&quot;=== TCP Echo Server ===\\n&quot;);

    // 1. Create socket
    server_fd = socket(AF_INET, SOCK_STREAM, 0);
    if (server_fd == -1) {
        perror(&quot;socket&quot;);
        exit(1);
    }

    printf(&quot;[Server] Socket created\\n&quot;);

    // Set socket options
    int opt = 1;
    if (setsockopt(server_fd, SOL_SOCKET, SO_REUSEADDR, 
                   &amp;opt, sizeof(opt)) == -1) {
        perror(&quot;setsockopt&quot;);
    }

    // 2. Bind to address and port
    memset(&amp;server_addr, 0, sizeof(server_addr));
    server_addr.sin_family = AF_INET;
    server_addr.sin_addr.s_addr = INADDR_ANY;
    server_addr.sin_port = htons(port);

    if (bind(server_fd, (struct sockaddr *)&amp;server_addr, 
             sizeof(server_addr)) == -1) {
        perror(&quot;bind&quot;);
        close(server_fd);
        exit(1);
    }

    printf(&quot;[Server] Bound to port %d\\n&quot;, port);

    // 3. Listen for connections
    if (listen(server_fd, BACKLOG) == -1) {
        perror(&quot;listen&quot;);
        close(server_fd);
        exit(1);
    }

    printf(&quot;[Server] Listening for connections...\\n&quot;);
    printf(&quot;[Server] Press Ctrl+C to stop\\n\\n&quot;);

    // 4. Accept loop
    while (1) {
        client_len = sizeof(client_addr);
        client_fd = accept(server_fd, (struct sockaddr *)&amp;client_addr, 
                          &amp;client_len);

        if (client_fd == -1) {
            if (errno == EINTR) {
                continue;  // Interrupted by signal
            }
            perror(&quot;accept&quot;);
            continue;
        }

        // Get client info
        char client_ip[INET_ADDRSTRLEN];
        inet_ntop(AF_INET, &amp;client_addr.sin_addr, client_ip, sizeof(client_ip));
        int client_port = ntohs(client_addr.sin_port);

        printf(&quot;[Client %s:%d] Connected\\n&quot;, client_ip, client_port);

        // 5. Echo loop
        while (1) {
            ssize_t bytes_read = recv(client_fd, buffer, sizeof(buffer) - 1, 0);

            if (bytes_read &lt;= 0) {
                if (bytes_read == 0) {
                    printf(&quot;[Client %s:%d] Disconnected\\n&quot;, client_ip, client_port);
                } else {
                    perror(&quot;recv&quot;);
                }
                break;
            }

            buffer[bytes_read] = '\\0';
            printf(&quot;[Client %s:%d] Received %zd bytes: %s&quot;, 
                   client_ip, client_port, bytes_read, buffer);

            // Echo back
            ssize_t bytes_sent = send(client_fd, buffer, bytes_read, 0);
            if (bytes_sent == -1) {
                perror(&quot;send&quot;);
                break;
            }

            printf(&quot;[Client %s:%d] Echoed %zd bytes\\n&quot;, 
                   client_ip, client_port, bytes_sent);
        }

        // 6. Close client connection
        close(client_fd);
        printf(&quot;[Client %s:%d] Connection closed\\n\\n&quot;, client_ip, client_port);
    }

    close(server_fd);
    return 0;
}

<pre><code class="language-c">/*
 * threads_demo.c - Demonstrates POSIX threads (pthreads)
 * 
 * Compile: gcc -pthread -o threads_demo threads_demo.c
 * Usage: ./threads_demo
 */

#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;string.h&gt;

// Shared data
pthread_mutex_t mutex = PTHREAD_MUTEX_INITIALIZER;
pthread_cond_t cond = PTHREAD_COND_INITIALIZER;
int counter = 0;
int ready = 0;

// Simple thread function
void *simple_thread(void *arg) {
    long id = (long)arg;
    printf(&quot;[Thread %ld] Started\\n&quot;, id);
    sleep(1);
    printf(&quot;[Thread %ld] Finished\\n&quot;, id);
    return (void *)(id * 2);
}

// Thread with mutex
void *mutex_thread(void *arg) {
    for (int i = 0; i &lt; 10000; i++) {
        pthread_mutex_lock(&amp;mutex);
        counter++;
        pthread_mutex_unlock(&amp;mutex);
    }
    return NULL;
}

// Producer thread
void *producer(void *arg) {
    for (int i = 0; i &lt; 5; i++) {
        pthread_mutex_lock(&amp;mutex);

        printf(&quot;[Producer] Producing item %d\\n&quot;, i);
        counter = i;
        ready = 1;

        pthread_cond_signal(&amp;cond);
        pthread_mutex_unlock(&amp;mutex);

        sleep(1);
    }
    return NULL;
}

// Consumer thread
void *consumer(void *arg) {
    for (int i = 0; i &lt; 5; i++) {
        pthread_mutex_lock(&amp;mutex);

        while (!ready) {
            pthread_cond_wait(&amp;cond, &amp;mutex);
        }

        printf(&quot;[Consumer] Consuming item %d\\n&quot;, counter);
        ready = 0;

        pthread_mutex_unlock(&amp;mutex);
    }
    return NULL;
}

void demo_simple_threads() {
    printf(&quot;\\n=== Simple Threads Demo ===\\n&quot;);

    pthread_t threads[3];

    // Create threads
    for (long i = 0; i &lt; 3; i++) {
        if (pthread_create(&amp;threads[i], NULL, simple_thread, (void *)i) != 0) {
            perror(&quot;pthread_create&quot;);
            return;
        }
    }

    // Wait for threads and get return values
    for (int i = 0; i &lt; 3; i++) {
        void *result;
        pthread_join(threads[i], &amp;result);
        printf(&quot;[Main] Thread %d returned: %ld\\n&quot;, i, (long)result);
    }
}

void demo_mutex() {
    printf(&quot;\\n=== Mutex Demo ===\\n&quot;);

    pthread_t t1, t2;
    counter = 0;

    printf(&quot;[Main] Initial counter: %d\\n&quot;, counter);

    pthread_create(&amp;t1, NULL, mutex_thread, NULL);
    pthread_create(&amp;t2, NULL, mutex_thread, NULL);

    pthread_join(t1, NULL);
    pthread_join(t2, NULL);

    printf(&quot;[Main] Final counter: %d (expected: 20000)\\n&quot;, counter);
}

void demo_condition_variable() {
    printf(&quot;\\n=== Condition Variable Demo ===\\n&quot;);

    pthread_t prod, cons;
    counter = 0;
    ready = 0;

    pthread_create(&amp;cons, NULL, consumer, NULL);
    pthread_create(&amp;prod, NULL, producer, NULL);

    pthread_join(prod, NULL);
    pthread_join(cons, NULL);
}

// Thread attributes demo
void demo_thread_attributes() {
    printf(&quot;\\n=== Thread Attributes Demo ===\\n&quot;);

    pthread_t thread;
    pthread_attr_t attr;

    // Initialize attributes
    pthread_attr_init(&amp;attr);

    // Set detached state
    pthread_attr_setdetachstate(&amp;attr, PTHREAD_CREATE_DETACHED);

    // Set stack size
    size_t stacksize = 2 * 1024 * 1024;  // 2MB
    pthread_attr_setstacksize(&amp;attr, stacksize);

    printf(&quot;[Main] Creating detached thread with 2MB stack\\n&quot;);

    if (pthread_create(&amp;thread, &amp;attr, simple_thread, (void *)99L) != 0) {
        perror(&quot;pthread_create&quot;);
        pthread_attr_destroy(&amp;attr);
        return;
    }

    pthread_attr_destroy(&amp;attr);

    // No need to join (detached)
    sleep(2);
    printf(&quot;[Main] Detached thread completed\\n&quot;);
}

<h3 id="readwrite-flow">Read/Write Flow</h3>
<pre><code>read() Operation:

┌──────────────┐           │   (Page Cache)  │     ┌─────────┐

└──────────────┘           └─────────────────┘     └─────────┘
      ▲                            │
      └────────────────────────────┘
         returns bytes read

                           ┌─────────────────┐
User Buffer (buf)          │  Kernel Buffer  │        Disk
┌──────────────┐           │   (Page Cache)  │     ┌─────────┐
│ &quot;Hello&quot;      │  ────────►│  &quot;Hello&quot;        │ ───►│ File    │
│              │  copy     │                 │write│ Data    │

                                   └─────────────────────┘

<h3 id="file-offset">File Offset</h3>
<pre><code>File: &quot;Hello, World!\\n&quot;
      0123456789...

Initial state:
┌──────────────────────────────┐
│ H e l l o ,   W o r l d ! \\n │
│ ▲                            │
│ offset = 0                   │
└──────────────────────────────┘

After read(fd, buf, 5):
┌──────────────────────────────┐
│ H e l l o ,   W o r l d ! \\n │
│           ▲                  │
│           offset = 5         │
└──────────────────────────────┘
buf now contains: &quot;Hello&quot;

After read(fd, buf, 7):
┌──────────────────────────────┐
│ H e l l o ,   W o r l d ! \\n │
│                       ▲      │
│                       offset = 12
└──────────────────────────────┘
buf now contains: &quot;, World&quot;
</code></pre>
<h3 id="example_1">Example</h3>
<pre><code class="language-c">#include &lt;fcntl.h&gt;
#include &lt;unistd.h&gt;
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

int main() {
    int fd;
    char write_buf[] = &quot;Hello, System Calls!&quot;;
    char read_buf[100];
    ssize_t bytes;

    // Write to file
    fd = open(&quot;test.txt&quot;, O_CREAT | O_WRONLY | O_TRUNC, 0644);
    if (fd == -1) {
        perror(&quot;open for write&quot;);
        return 1;
    }

    bytes = write(fd, write_buf, strlen(write_buf));
    printf(&quot;Wrote %zd bytes\\n&quot;, bytes);
    close(fd);

    // Read from file
    fd = open(&quot;test.txt&quot;, O_RDONLY);
    if (fd == -1) {
        perror(&quot;open for read&quot;);
        return 1;
    }

    bytes = read(fd, read_buf, sizeof(read_buf) - 1);
    if (bytes &gt; 0) {
        read_buf[bytes] = '\\0';  // Null terminate
        printf(&quot;Read %zd bytes: %s\\n&quot;, bytes, read_buf);
    }
    close(fd);

    return 0;
}
</code></pre>
<h2 id="3-lseek---change-file-offset">3. lseek() - Change File Offset</h2>

<h3 id="whence-values">Whence Values</h3>
<pre><code>SEEK_SET: offset from beginning of file
┌────────────────────────────────┐
│ [file content]                 │
│ ▲                              │
│ └─ lseek(fd, 10, SEEK_SET)     │
│    offset = 10                 │
└────────────────────────────────┘

SEEK_CUR: offset from current position
┌────────────────────────────────┐
│ [file content]                 │
│           ▲                    │
│ current   └─ lseek(fd, 5, SEEK_CUR)
│ pos       offset = current + 5 │
└────────────────────────────────┘

SEEK_END: offset from end of file
┌────────────────────────────────┐
│ [file content]                 │
│                              ▲ │
│     lseek(fd, -10, SEEK_END)─┘ │
│     offset = file_size - 10    │
└────────────────────────────────┘
</code></pre>
<h3 id="creating-sparse-files">Creating Sparse Files</h3>
<pre><code>Normal File (1MB):
┌────────────────────────────────────────┐
│████████████████████████████████████████│ 1 MB on disk
└────────────────────────────────────────┘

Sparse File (1MB logical, data at ends):
┌────┬───────────────────────────┬─────┐
│████│░░░░░░░░░░░░░░░░░░░░░░░░░░░│█████│ ~8 KB on disk
└────┴───────────────────────────┴─────┘
 data        (hole)              data
</code></pre>
<h3 id="example_2">Example</h3>
<pre><code class="language-c">#include &lt;fcntl.h&gt;
#include &lt;unistd.h&gt;
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

int main() {
    int fd;
    off_t offset;
    char buf[20];

    fd = open(&quot;test.txt&quot;, O_RDWR | O_CREAT | O_TRUNC, 0644);
    if (fd == -1) {
        perror(&quot;open&quot;);
        return 1;
    }

    // Write at beginning
    write(fd, &quot;START&quot;, 5);

    // Seek to position 100 (creates sparse file)
    offset = lseek(fd, 100, SEEK_SET);
    printf(&quot;Current offset: %ld\\n&quot;, offset);

    // Write at offset 100
    write(fd, &quot;END&quot;, 3);

    // Get file size
    offset = lseek(fd, 0, SEEK_END);
    printf(&quot;File size: %ld bytes\\n&quot;, offset);

    // Read from beginning
    lseek(fd, 0, SEEK_SET);
    read(fd, buf, 5);
    buf[5] = '\\0';
    printf(&quot;First 5 bytes: %s\\n&quot;, buf);

    close(fd);
    return 0;
}
</code></pre>

<h3 id="example_3">Example</h3>

<h3 id="file-locking">File Locking</h3>
<pre><code>File Locking Types:

Read Lock (Shared):
┌──────────────────────────────────┐
│ Process A: Read Lock (bytes 0-99)│◄─┐
│ Process B: Read Lock (bytes 0-99)│◄─┼─ Multiple readers OK
│ Process C: Read Lock (bytes 0-99)│◄─┘
└──────────────────────────────────┘

Write Lock (Exclusive):
┌──────────────────────────────────┐
│ Process A: Write Lock(bytes 0-99)│◄── Only one writer
│ Process B: BLOCKED               │◄── Must wait
│ Process C: BLOCKED               │◄── Must wait
└──────────────────────────────────┘

Advisory vs Mandatory:
┌────────────────────────────────────────┐
│ Advisory Locking (Linux default)       │
│ - Cooperative                          │
│ - Processes must check locks           │
│ - Can be bypassed                      │
└────────────────────────────────────────┘
</code></pre>
<h3 id="example_4">Example</h3>
<pre><code class="language-c">#include &lt;fcntl.h&gt;
#include &lt;unistd.h&gt;
#include &lt;stdio.h&gt;
#include &lt;errno.h&gt;

int main() {
    int fd;
    struct flock lock;

    fd = open(&quot;lockfile.txt&quot;, O_RDWR | O_CREAT, 0644);
    if (fd == -1) {
        perror(&quot;open&quot;);
        return 1;
    }

    // Set up write lock structure
    lock.l_type = F_WRLCK;      // Write lock
    lock.l_whence = SEEK_SET;   // From start of file
    lock.l_start = 0;           // Offset
    lock.l_len = 0;             // Lock entire file (0 = EOF)

    printf(&quot;Trying to acquire lock...\\n&quot;);

    // Try to acquire lock (non-blocking)
    if (fcntl(fd, F_SETLK, &amp;lock) == -1) {
        if (errno == EACCES || errno == EAGAIN) {
            printf(&quot;File is already locked\\n&quot;);
        } else {
            perror(&quot;fcntl&quot;);
        }
        close(fd);
        return 1;
    }

    printf(&quot;Lock acquired! Press Enter to release...\\n&quot;);
    getchar();

    // Release lock
    lock.l_type = F_UNLCK;
    fcntl(fd, F_SETLK, &amp;lock);

    close(fd);
    return 0;
}
</code></pre>

│ Inode 12345                 │
│ - Data blocks: [10, 11, 12] │
│ - Link count: 3             │
│ - Permissions: rw-r--r--    │
└─────────────────────────────┘
         ▲        ▲         ▲
         │        │         │
    ┌────┴───┬────┴───┬─────┴────┐
    │ /a.txt │ /b.txt │ /c.txt   │ ← All point to same inode
    └────────┴────────┴──────────┘

Deleting /a.txt: link count becomes 2
Data is deleted only when link count reaches 0

Symbolic (Soft) Links:
Original File:
┌─────────────────────────────┐
│ Inode 12345                 │
│ File: /path/original.txt    │
│ Data: &quot;Hello World&quot;         │
└─────────────────────────────┘
         ▲
         │
┌────────┴──────────────────────┐
│ Inode 67890                   │
│ Symbolic Link: /link.txt      │
│ Data: &quot;/path/original.txt&quot;    │
└───────────────────────────────┘
         │
         └─► Points to pathname, not inode

If original is deleted, symlink becomes &quot;dangling&quot;
</code></pre>
<h3 id="example_7">Example</h3>
<pre><code class="language-c">#include &lt;unistd.h&gt;
#include &lt;stdio.h&gt;
#include &lt;sys/stat.h&gt;

int main() {
    struct stat sb;
    char link_target[256];
    ssize_t len;

    // Create original file
    FILE *fp = fopen(&quot;original.txt&quot;, &quot;w&quot;);
    fprintf(fp, &quot;Hello, Links!\\n&quot;);
    fclose(fp);

    // Create hard link
    if (link(&quot;original.txt&quot;, &quot;hardlink.txt&quot;) == -1) {
        perror(&quot;link&quot;);
    } else {
        printf(&quot;Created hard link\\n&quot;);
    }

    // Create symbolic link
    if (symlink(&quot;original.txt&quot;, &quot;symlink.txt&quot;) == -1) {
        perror(&quot;symlink&quot;);
    } else {
        printf(&quot;Created symbolic link\\n&quot;);
    }

    // Check link count
    if (stat(&quot;original.txt&quot;, &amp;sb) == 0) {
        printf(&quot;Link count: %lu\\n&quot;, sb.st_nlink);
    }

    // Read symbolic link target
    len = readlink(&quot;symlink.txt&quot;, link_target, sizeof(link_target) - 1);
    if (len != -1) {
        link_target[len] = '\\0';
        printf(&quot;Symlink points to: %s\\n&quot;, link_target);
    }

    return 0;
}

<h3 id="pipe-structure">Pipe Structure</h3>
<pre><code>pipe(pipefd):

pipefd[0] ────► Read end
pipefd[1] ────► Write end

┌────────────────────────────────────────────────────────┐
│                    Kernel Space                        │
│  ┌──────────────────────────────────────────────────┐  │
│  │  Pipe Buffer (typically 64KB)                    │  │
│  │  ┌────┬────┬────┬────┬────┬────┬────┐            │  │
│  │  │ D1 │ D2 │ D3 │ D4 │    │    │    │  FIFO      │  │
│  │  └────┴────┴────┴────┴────┴────┴────┘            │  │

│  └────┼──────────────────────────────┼──────────────┘  │
└───────┼──────────────────────────────┼─────────────────┘
        │                              │
     read(pipefd[0])             write(pipefd[1])
        │                              │
┌───────┴────────────┐        ┌────────┴──────────┐
│  Reader Process    │        │  Writer Process   │
│  (usually child)   │        │  (usually parent) │
└────────────────────┘        └───────────────────┘

Data Flow: Writer → Pipe Buffer → Reader (one direction only)
</code></pre>
<h3 id="fork-and-pipes">fork() and Pipes</h3>
<pre><code>Before fork():
┌───────────────────────────────┐
│ Parent Process                │
│                               │
│ pipefd[0] (read)  ──────┐     │
│ pipefd[1] (write) ──────┼───► Pipe
└─────────────────────────┼─────┘
                          │

After fork():
┌────────────────────────────────┐    ┌───────────────────────┐
│ Parent Process                 │    │ Child Process         │
│                                │    │                       │
│ pipefd[0] ─────┐               │    │ pipefd[0] ─────┐      │
│ pipefd[1] ─────┼───┐           │    │ pipefd[1] ─────┼───┐  │
└────────────────┼───┼───────────┘    └────────────────┼───┼──┘
                 │   │                                 │   │
                 ▼   ▼                                 ▼   ▼

              │           Shared Pipe                       │
              └─────────────────────────────────────────────┘

Typical Pattern:
  Parent: close(pipefd[0]), use pipefd[1] for writing
  Child:  close(pipefd[1]), use pipefd[0] for reading

<h3 id="example-basic-pipe">Example: Basic Pipe</h3>
<pre><code class="language-c">#include &lt;unistd.h&gt;
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/wait.h&gt;

int main() {
    int pipefd[2];
    pid_t pid;
    char write_msg[] = &quot;Hello through pipe!&quot;;
    char read_msg[100];

    // Create pipe
    if (pipe(pipefd) == -1) {
        perror(&quot;pipe&quot;);
        return 1;
    }

    pid = fork();

    if (pid == -1) {
        perror(&quot;fork&quot;);
        return 1;
    }

    if (pid == 0) {
        // Child process - reader
        close(pipefd[1]);  // Close unused write end

        ssize_t n = read(pipefd[0], read_msg, sizeof(read_msg));
        if (n &gt; 0) {
            read_msg[n] = '\\0';
            printf(&quot;Child received: %s\\n&quot;, read_msg);
        }

        close(pipefd[0]);
        return 0;
    }
    else {
        // Parent process - writer
        close(pipefd[0]);  // Close unused read end

        printf(&quot;Parent sending: %s\\n&quot;, write_msg);
        write(pipefd[1], write_msg, strlen(write_msg));

        close(pipefd[1]);
        wait(NULL);  // Wait for child
    }

    return 0;
}

<pre><code class="language-c">#include &lt;unistd.h&gt;

        perror(&quot;pipe&quot;);
        return 1;
    }

    // First child: ls
    pid1 = fork();
    if (pid1 == 0) {
        close(pipefd[0]);           // Close read end
        dup2(pipefd[1], STDOUT_FILENO);  // Redirect stdout to pipe
        close(pipefd[1]);
        execlp(&quot;ls&quot;, &quot;ls&quot;, &quot;-l&quot;, NULL);
        perror(&quot;execlp ls&quot;);
        return 1;

    // Second child: wc -l
    pid2 = fork();
    if (pid2 == 0) {
        close(pipefd[1]);           // Close write end
        dup2(pipefd[0], STDIN_FILENO);   // Redirect stdin from pipe
        close(pipefd[0]);
        execlp(&quot;wc&quot;, &quot;wc&quot;, &quot;-l&quot;, NULL);
        perror(&quot;execlp wc&quot;);
        return 1;
    }

    // Parent
    close(pipefd[0]);
    close(pipefd[1]);

    waitpid(pid1, NULL, 0);
    waitpid(pid2, NULL, 0);

    return 0;
}

<h2 id="2-fifos-named-pipes">2. FIFOs (Named Pipes)</h2>
<h3 id="synopsis_1">Synopsis</h3>
<pre><code class="language-c">#include &lt;sys/stat.h&gt;

int mkfifoat(int dirfd, const char *pathname, mode_t mode);

<h3 id="fifo-vs-pipe">FIFO vs Pipe</h3>
<pre><code>Unnamed Pipe:
  • Only between related processes (parent-child)
  • Exists only while processes run
  • No filesystem name

Named Pipe (FIFO):
  • Between any processes (unrelated)
  • Persists in filesystem
  • Has a pathname

FIFO in Filesystem:
/tmp/
  ├── myfifo  ←── prw-r--r-- (p indicates FIFO)
  ├── file.txt
  └── ...

Process A: open(&quot;/tmp/myfifo&quot;, O_WRONLY);
Process B: open(&quot;/tmp/myfifo&quot;, O_RDONLY);
</code></pre>
<h3 id="example-fifo-writer">Example: FIFO Writer</h3>
<pre><code class="language-c">#include &lt;fcntl.h&gt;
#include &lt;sys/stat.h&gt;
#include &lt;unistd.h&gt;
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

int main() {
    const char *fifo_path = &quot;/tmp/my_fifo&quot;;
    int fd;
    const char *message = &quot;Hello via FIFO!\\n&quot;;

    // Create FIFO
    if (mkfifo(fifo_path, 0666) == -1) {
        perror(&quot;mkfifo (may already exist)&quot;);
    }

    printf(&quot;Opening FIFO for writing...\\n&quot;);
    fd = open(fifo_path, O_WRONLY);  // Blocks until reader opens
    if (fd == -1) {
        perror(&quot;open&quot;);
        return 1;
    }

    printf(&quot;Writing to FIFO: %s&quot;, message);
    write(fd, message, strlen(message));

    close(fd);
    return 0;
}
</code></pre>
<h3 id="example-fifo-reader">Example: FIFO Reader</h3>
<pre><code class="language-c">#include &lt;fcntl.h&gt;
#include &lt;unistd.h&gt;
#include &lt;stdio.h&gt;

int main() {
    const char *fifo_path = &quot;/tmp/my_fifo&quot;;
    int fd;
    char buffer[100];
    ssize_t bytes;

    printf(&quot;Opening FIFO for reading...\\n&quot;);
    fd = open(fifo_path, O_RDONLY);  // Blocks until writer opens
    if (fd == -1) {
        perror(&quot;open&quot;);
        return 1;
    }

    printf(&quot;Reading from FIFO:\\n&quot;);
    while ((bytes = read(fd, buffer, sizeof(buffer))) &gt; 0) {
        write(STDOUT_FILENO, buffer, bytes);
    }

    close(fd);
    unlink(fifo_path);  // Clean up
    return 0;
}
</code></pre>

                           │ Kernel         │
                           │ Signal Pending │
                           └────────┬───────┘
                                    │
2. Signal Handling:                 │
                                    ▼
                    ┌───────────────────────────┐
                    │ Process resumes           │
                    │ Check pending signals     │
                    └───────────┬───────────────┘
                                │
                    ┌───────────┴──────────┬──────────┐
                    ▼                      ▼          ▼
              ┌──────────┐          ┌──────────┐  ┌──────────┐
              │ Default  │          │ Ignore   │  │ Handler  │
              │ Action   │          │          │  │ Function │
              └──────────┘          └──────────┘  └──────────┘
              (term/stop/                          signal_handler()
               core/ignore)                        { ... }
</code></pre>
<h3 id="example-signal-handler">Example: Signal Handler</h3>
<pre><code class="language-c">#include &lt;signal.h&gt;
#include &lt;stdio.h&gt;
#include &lt;unistd.h&gt;
#include &lt;stdlib.h&gt;

volatile sig_atomic_t signal_received = 0;

void signal_handler(int signum) {
    printf(&quot;\\nReceived signal %d\\n&quot;, signum);
    signal_received = 1;
}

int main() {
    struct sigaction sa;

    // Set up signal handler using sigaction (preferred)
    sa.sa_handler = signal_handler;
    sigemptyset(&amp;sa.sa_mask);
    sa.sa_flags = 0;

    if (sigaction(SIGINT, &amp;sa, NULL) == -1) {
        perror(&quot;sigaction&quot;);
        return 1;
    }

    printf(&quot;Process PID: %d\\n&quot;, getpid());
    printf(&quot;Press Ctrl+C to send SIGINT...\\n&quot;);
    printf(&quot;Waiting for signal...\\n&quot;);

    while (!signal_received) {
        sleep(1);
        printf(&quot;.&quot;);
        fflush(stdout);
    }

    printf(&quot;\\nSignal handled, exiting.\\n&quot;);
    return 0;
}
</code></pre>
<h3 id="example-signal-masking">Example: Signal Masking</h3>
<pre><code class="language-c">#include &lt;signal.h&gt;
#include &lt;stdio.h&gt;
#include &lt;unistd.h&gt;

int main() {
    sigset_t new_mask, old_mask, pending;

    // Initialize empty signal set
    sigemptyset(&amp;new_mask);

    // Add SIGINT to the set
    sigaddset(&amp;new_mask, SIGINT);

    // Block SIGINT
    printf(&quot;Blocking SIGINT for 5 seconds...\\n&quot;);
    printf(&quot;Try pressing Ctrl+C now (it will be queued)\\n&quot;);

    if (sigprocmask(SIG_BLOCK, &amp;new_mask, &amp;old_mask) == -1) {
        perror(&quot;sigprocmask&quot;);
        return 1;
    }

    sleep(5);

    // Check for pending signals
    if (sigpending(&amp;pending) == -1) {
        perror(&quot;sigpending&quot;);
        return 1;
    }

    if (sigismember(&amp;pending, SIGINT)) {
        printf(&quot;SIGINT is pending!\\n&quot;);
    }

    // Unblock SIGINT
    printf(&quot;Unblocking SIGINT...\\n&quot;);
    if (sigprocmask(SIG_SETMASK, &amp;old_mask, NULL) == -1) {
        perror(&quot;sigprocmask&quot;);
        return 1;
    }

    printf(&quot;SIGINT unblocked. Signal delivered now.\\n&quot;);
    sleep(2);

    return 0;
}
</code></pre>
<h2 id="4-message-queues-system-v">4. Message Queues (System V)</h2>
<h3 id="synopsis_3">Synopsis</h3>
<pre><code class="language-c">#include &lt;sys/msg.h&gt;

int msgget(key_t key, int msgflg);
int msgsnd(int msqid, const void *msgp, size_t msgsz, int msgflg);
ssize_t msgrcv(int msqid, void *msgp, size_t msgsz, long msgtyp,
               int msgflg);
int msgctl(int msqid, int cmd, struct msqid_ds *buf);
</code></pre>
<h3 id="message-queue-structure">Message Queue Structure</h3>
<pre><code>Message Queue (in kernel):

┌─────────────────────────────────────────────────────┐
│ Message Queue ID: 12345                             │
│ Key: 0x1234                                         │
│                                                     │
│ ┌────────────────┐  ┌────────────────┐              │
│ │ Message 1      │  │ Message 2      │              │
│ │ Type: 1        │→ │ Type: 2        │→ ...         │
│ │ Data: &quot;Hello&quot;  │  │ Data: &quot;World&quot;  │              │
│ └────────────────┘  └────────────────┘              │
│  ▲                                        ▲         │
│  │ msgsnd()                    msgrcv()   │         │
└──┼────────────────────────────────────────┼─────────┘
   │                                        │
┌──┴──────────────┐              ┌─────────┴───────┐
│ Sender Process  │              │ Receiver Process│
│ (any process)   │              │ (any process)   │
└─────────────────┘              └─────────────────┘

Message Types allow selective retrieval:
  msgrcv(msgtyp=0)  : Get first message
  msgrcv(msgtyp&gt;0)  : Get message of that type
  msgrcv(msgtyp&lt;0)  : Get message with lowest type ≤ |msgtyp|
</code></pre>
<h3 id="example-message-queue">Example: Message Queue</h3>
<pre><code class="language-c">#include &lt;sys/msg.h&gt;
#include &lt;sys/ipc.h&gt;
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;
#include &lt;unistd.h&gt;

struct message {
    long msg_type;
    char msg_text[100];
};

int main() {
    key_t key = 1234;
    int msgid;
    struct message msg;
    pid_t pid;

    // Create message queue
    msgid = msgget(key, IPC_CREAT | 0666);
    if (msgid == -1) {
        perror(&quot;msgget&quot;);
        return 1;
    }

    pid = fork();

    if (pid == 0) {
        // Child - receiver
        sleep(1);

        if (msgrcv(msgid, &amp;msg, sizeof(msg.msg_text), 1, 0) == -1) {
            perror(&quot;msgrcv&quot;);
            return 1;
        }

        printf(&quot;Child received (type %ld): %s\\n&quot;, 
               msg.msg_type, msg.msg_text);
        return 0;
    }
    else {
        // Parent - sender
        msg.msg_type = 1;
        strcpy(msg.msg_text, &quot;Hello via message queue!&quot;);

        printf(&quot;Parent sending: %s\\n&quot;, msg.msg_text);

        if (msgsnd(msgid, &amp;msg, strlen(msg.msg_text) + 1, 0) == -1) {
            perror(&quot;msgsnd&quot;);
            return 1;
        }

        wait(NULL);

        // Remove message queue
        msgctl(msgid, IPC_RMID, NULL);
    }

    return 0;
}
</code></pre>
<h2 id="5-semaphores-system-v">5. Semaphores (System V)</h2>
<h3 id="synopsis_4">Synopsis</h3>
<pre><code class="language-c">#include &lt;sys/sem.h&gt;

int semget(key_t key, int nsems, int semflg);
int semop(int semid, struct sembuf *sops, size_t nsops);
int semctl(int semid, int semnum, int cmd, ...);
</code></pre>
<h3 id="semaphore-operations">Semaphore Operations</h3>
<pre><code>Binary Semaphore (mutex):
┌─────────────────────────────────────┐
│ Semaphore Value: 1 (available)      │
└─────────────────────────────────────┘
           │
Process A: semop(-1)  [P operation, wait, lock]
           │
           ▼
┌─────────────────────────────────────┐
│ Semaphore Value: 0 (locked)         │
└─────────────────────────────────────┘
           │
Process B: semop(-1)  → BLOCKS (waits)
           │
Process A: semop(+1)  [V operation, signal, unlock]
           │
           ▼
┌─────────────────────────────────────┐
│ Semaphore Value: 1 (available)      │
└─────────────────────────────────────┘
           │
Process B: unblocks, continues

Counting Semaphore (resource pool):
┌─────────────────────────────────────┐
│ Semaphore Value: 3 (3 resources)    │
└─────────────────────────────────────┘
           │
  3 processes can acquire simultaneously
  4th process blocks until one releases
</code></pre>
<h3 id="example-semaphore">Example: Semaphore</h3>
<pre><code class="language-c">#include &lt;sys/sem.h&gt;
#include &lt;sys/ipc.h&gt;
#include &lt;stdio.h&gt;
#include &lt;unistd.h&gt;

union semun {
    int val;
    struct semid_ds *buf;
    unsigned short *array;
};

// P operation (wait, acquire)
void sem_wait(int semid) {
    struct sembuf op = {0, -1, 0};  // sem_num, sem_op, sem_flg
    semop(semid, &amp;op, 1);
}

// V operation (signal, release)
void sem_signal(int semid) {
    struct sembuf op = {0, +1, 0};
    semop(semid, &amp;op, 1);
}

int main() {
    key_t key = 1234;
    int semid;
    union semun arg;
    pid_t pid;

    // Create semaphore
    semid = semget(key, 1, IPC_CREAT | 0666);
    if (semid == -1) {
        perror(&quot;semget&quot;);
        return 1;
    }

    // Initialize semaphore to 1 (binary semaphore/mutex)
    arg.val = 1;
    semctl(semid, 0, SETVAL, arg);

    pid = fork();

    if (pid == 0) {
        // Child
        for (int i = 0; i &lt; 5; i++) {
            sem_wait(semid);  // Enter critical section
            printf(&quot;Child: %d\\n&quot;, i);
            sleep(1);
            sem_signal(semid);  // Leave critical section
        }
        return 0;
    }
    else {
        // Parent
        for (int i = 0; i &lt; 5; i++) {
            sem_wait(semid);  // Enter critical section
            printf(&quot;Parent: %d\\n&quot;, i);
            sleep(1);
            sem_signal(semid);  // Leave critical section
        }

        wait(NULL);

        // Remove semaphore
        semctl(semid, 0, IPC_RMID);
    }

    return 0;
}
</code></pre>

<h3 id="socket-types">Socket Types</h3>
<pre><code>Stream Sockets (SOCK_STREAM):
  • TCP-like
  • Reliable, ordered, connection-oriented
  • Byte stream

Datagram Sockets (SOCK_DGRAM):
  • UDP-like
  • Unreliable, unordered, connectionless
  • Message boundaries preserved

Unix Domain Sockets:
  • Local IPC (not network)
  • Faster than TCP
  • Can pass file descriptors
</code></pre>

├──────────────┼────────┼────────┼─────────┼───────────┼────────┤
│ Pipe         │ Fast   │ Easy   │ No      │ Limited   │ Common │
│ FIFO         │ Fast   │ Easy   │ Yes     │ Limited   │ Common │
│ Signals      │ Fast   │ Easy   │ No      │ Minimal   │ Common │
│ Msg Queue    │ Medium │ Medium │ Yes     │ Medium    │ Less   │

   ✓ Close pipes and FIFOs

   ✓ Use sigaction, not signal
   ✓ Keep handlers short and simple
   ✓ Use sig_atomic_t for shared variables

3. Synchronize shared resources
   ✓ Use semaphores with shared memory
   ✓ Handle race conditions

4. Check all return values
   ✓ IPC calls can fail in many ways

   ✓ Set appropriate permissions

<h3 id="reading-proc">Reading /proc</h3>
<pre><code class="language-c">#include &lt;stdio.h&gt;

void read_proc_status(pid_t pid) {
    char path[256];
    snprintf(path, sizeof(path), &quot;/proc/%d/status&quot;, pid);

    FILE *fp = fopen(path, &quot;r&quot;);
    if (fp == NULL) {
        perror(&quot;fopen&quot;);
        return;
    }

    char line[256];
    while (fgets(line, sizeof(line), fp)) {
        if (strncmp(line, &quot;VmSize:&quot;, 7) == 0 ||
            strncmp(line, &quot;VmRSS:&quot;, 6) == 0) {
            printf(&quot;%s&quot;, line);
        }
    }

    fclose(fp);
}

    }

    struct dirent *entry;
    printf(&quot;Open file descriptors:\\n&quot;);

    while ((entry = readdir(dir)) != NULL) {
        if (entry-&gt;d_name[0] == '.') continue;

        char fdpath[512], target[512];
        snprintf(fdpath, sizeof(fdpath), &quot;%s/%s&quot;, path, entry-&gt;d_name);

        ssize_t len = readlink(fdpath, target, sizeof(target) - 1);
        if (len != -1) {
            target[len] = '\\0';
            printf(&quot;  fd %s -&gt; %s\\n&quot;, entry-&gt;d_name, target);
        }
    }

    closedir(dir);
}

int main() {
    pid_t pid = getpid();

    printf(&quot;Process info for PID %d:\\n\\n&quot;, pid);

    read_proc_status(pid);
    printf(&quot;\\n&quot;);

    list_open_fds(pid);
    printf(&quot;\\n&quot;);

    // Read command line
    char cmdline_path[256];
    snprintf(cmdline_path, sizeof(cmdline_path), &quot;/proc/%d/cmdline&quot;, pid);

    FILE *fp = fopen(cmdline_path, &quot;r&quot;);
    if (fp) {
        char cmdline[1024];
        size_t n = fread(cmdline, 1, sizeof(cmdline) - 1, fp);

        // Replace null bytes with spaces
        for (size_t i = 0; i &lt; n; i++) {
            if (cmdline[i] == '\\0') cmdline[i] = ' ';
        }
        cmdline[n] = '\\0';

        printf(&quot;Command line: %s\\n&quot;, cmdline);
        fclose(fp);
    }

    return 0;
}
</code></pre>

<h2 id="kernel-parameters-sysctl">Kernel Parameters (sysctl)</h2>
<h3 id="reading-and-writing-kernel-parameters">Reading and Writing Kernel Parameters</h3>
<pre><code class="language-c">#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;

// Read sysctl value
int sysctl_read(const char *param, char *value, size_t size) {
    char path[256];
    snprintf(path, sizeof(path), &quot;/proc/sys/%s&quot;, param);

    // Replace '.' with '/'
    for (char *p = path + strlen(&quot;/proc/sys/&quot;); *p; p++) {
        if (*p == '.') *p = '/';
    }

    FILE *fp = fopen(path, &quot;r&quot;);
    if (fp == NULL) {
        return -1;
    }

    fgets(value, size, fp);

    // Remove trailing newline
    size_t len = strlen(value);
    if (len &gt; 0 &amp;&amp; value[len - 1] == '\\n') {
        value[len - 1] = '\\0';
    }

    fclose(fp);
    return 0;
}

// Write sysctl value (requires root)
int sysctl_write(const char *param, const char *value) {
    char path[256];
    snprintf(path, sizeof(path), &quot;/proc/sys/%s&quot;, param);

    // Replace '.' with '/'
    for (char *p = path + strlen(&quot;/proc/sys/&quot;); *p; p++) {
        if (*p == '.') *p = '/';
    }

    FILE *fp = fopen(path, &quot;w&quot;);
    if (fp == NULL) {
        return -1;
    }

    fprintf(fp, &quot;%s&quot;, value);
    fclose(fp);

    return 0;
}

int main() {
    char value[256];

    // Read kernel parameters
    if (sysctl_read(&quot;kernel.hostname&quot;, value, sizeof(value)) == 0) {
        printf(&quot;Hostname: %s\\n&quot;, value);
    }

    if (sysctl_read(&quot;vm.swappiness&quot;, value, sizeof(value)) == 0) {
        printf(&quot;Swappiness: %s\\n&quot;, value);
    }

    if (sysctl_read(&quot;net.ipv4.ip_forward&quot;, value, sizeof(value)) == 0) {
        printf(&quot;IP forwarding: %s\\n&quot;, value);
    }

    // Write (requires root)
    // sysctl_write(&quot;vm.swappiness&quot;, &quot;60&quot;);

    return 0;
}
</code></pre>

<pre><code class="language-c">#include &lt;sys/syscall.h&gt;
#include &lt;unistd.h&gt;
#include &lt;fcntl.h&gt;

// Load kernel module (requires root)
int load_module(const char *filename, const char *params) {
    int fd = open(filename, O_RDONLY);
    if (fd == -1) {
        return -1;
    }

    int ret = syscall(__NR_finit_module, fd, params, 0);
    close(fd);

    return ret;
}

// Unload kernel module (requires root)
int unload_module(const char *name, int flags) {
    return syscall(__NR_delete_module, name, flags);
}

<h3 id="perf_event_open---hardware-performance-counters">perf_event_open() - Hardware Performance Counters</h3>
<pre><code class="language-c">#include &lt;linux/perf_event.h&gt;
#include &lt;sys/syscall.h&gt;
#include &lt;unistd.h&gt;
#include &lt;string.h&gt;

long perf_event_open(struct perf_event_attr *attr,
                     pid_t pid, int cpu, int group_fd,
                     unsigned long flags) {
    return syscall(__NR_perf_event_open, attr, pid, cpu, group_fd, flags);
}

int main() {
    struct perf_event_attr attr;
    memset(&amp;attr, 0, sizeof(attr));

    attr.type = PERF_TYPE_HARDWARE;
    attr.size = sizeof(attr);
    attr.config = PERF_COUNT_HW_CPU_CYCLES;
    attr.disabled = 1;
    attr.exclude_kernel = 1;
    attr.exclude_hv = 1;

    // Monitor current process
    int fd = perf_event_open(&amp;attr, 0, -1, -1, 0);
    if (fd == -1) {
        perror(&quot;perf_event_open&quot;);
        return 1;
    }

    // Start counting
    ioctl(fd, PERF_EVENT_IOC_RESET, 0);
    ioctl(fd, PERF_EVENT_IOC_ENABLE, 0);

    // Do some work
    long sum = 0;
    for (long i = 0; i &lt; 10000000; i++) {
        sum += i;
    }

    // Stop counting
    ioctl(fd, PERF_EVENT_IOC_DISABLE, 0);

    // Read result
    long long count;
    read(fd, &amp;count, sizeof(count));

    printf(&quot;CPU cycles: %lld\\n&quot;, count);

    close(fd);
    return 0;
}

<h2 id="memory-management-internals">Memory Management Internals</h2>
<h3 id="page-faults">Page Faults</h3>
<pre><code>Page Fault Handling:

1. Process accesses memory at address X
2. MMU checks page table
3. Page not present → Page fault exception
4. CPU switches to kernel mode
5. Kernel page fault handler (do_page_fault):
   - Valid address in valid VMA?
     Yes: Allocate page, update page table
     No: Send SIGSEGV to process
6. Return to user mode
7. Retry instruction
</code></pre>
<h3 id="viewing-page-faults">Viewing Page Faults</h3>
<pre><code class="language-c">#include &lt;sys/resource.h&gt;

int main() {
    struct rusage usage;

    getrusage(RUSAGE_SELF, &amp;usage);

    printf(&quot;Page faults (minor): %ld\\n&quot;, usage.ru_minflt);
    printf(&quot;Page faults (major): %ld\\n&quot;, usage.ru_majflt);

    // Allocate and touch memory to cause page faults
    size_t size = 100 * 1024 * 1024;  // 100 MB
    char *mem = malloc(size);

    for (size_t i = 0; i &lt; size; i += 4096) {
        mem[i] = 0;  // Touch each page
    }

    getrusage(RUSAGE_SELF, &amp;usage);

    printf(&quot;After allocation:\\n&quot;);
    printf(&quot;Page faults (minor): %ld\\n&quot;, usage.ru_minflt);
    printf(&quot;Page faults (major): %ld\\n&quot;, usage.ru_majflt);

    free(mem);
    return 0;
}
</code></pre>

<h2 id="1-brk-and-sbrk---heap-management">1. brk() and sbrk() - Heap Management</h2>
<h3 id="synopsis">Synopsis</h3>
<pre><code class="language-c">#include &lt;unistd.h&gt;

int brk(void *addr);
void *sbrk(intptr_t increment);
</code></pre>
<h3 id="how-brksbrk-works">How brk/sbrk Works</h3>
<pre><code>Initial state:
┌───────────────────────────────────────┐
│  Data Segment                         │
│  int x = 10;                          │
├───────────────────────────────────────┤ ← Program break (brk)
│                                       │
│  Available for heap                   │
│                                       │
└───────────────────────────────────────┘

After malloc(100) → uses sbrk(100):
┌───────────────────────────────────────┐
│  Data Segment                         │
│  int x = 10;                          │
├───────────────────────────────────────┤
│  Allocated (100 bytes)                │
│  ████████████████████████████         │
├───────────────────────────────────────┤ ← New program break
│                                       │
│  Available for heap                   │
│                                       │
└───────────────────────────────────────┘

After another malloc(50):
┌───────────────────────────────────────┐
│  Data Segment                         │
├───────────────────────────────────────┤
│  Allocated (100 bytes)                │
│  ████████████████████████████         │
├───────────────────────────────────────┤
│  Allocated (50 bytes)                 │
│  ██████████████                       │
├───────────────────────────────────────┤ ← Program break moves up
│                                       │
│  Available for heap                   │
└───────────────────────────────────────┘

Note: free() usually doesn't call brk() to shrink heap
      (memory is cached for future allocations)
</code></pre>
<h3 id="example">Example</h3>
<pre><code class="language-c">#include &lt;unistd.h&gt;
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

int main() {
    void *current_brk, *new_brk;
    char *buffer;

    // Get current program break
    current_brk = sbrk(0);
    printf(&quot;Current break: %p\\n&quot;, current_brk);

    // Allocate 1024 bytes
    buffer = sbrk(1024);
    if (buffer == (void *)-1) {
        perror(&quot;sbrk&quot;);
        return 1;
    }

    printf(&quot;Allocated at: %p\\n&quot;, buffer);

    // Use the memory
    strcpy(buffer, &quot;Hello from heap!&quot;);
    printf(&quot;Content: %s\\n&quot;, buffer);

    // Check new break
    new_brk = sbrk(0);
    printf(&quot;New break: %p\\n&quot;, new_brk);
    printf(&quot;Increased by: %ld bytes\\n&quot;, 
           (char *)new_brk - (char *)current_brk);

    // Note: Cannot easily free with sbrk
    // Use malloc/free for proper memory management

    return 0;
}

│ Free    │───►│ Free    │───►│ Free    │───► NULL
│ Block 1 │    │ Block 2 │    │ Block 3 │
└─────────┘    └─────────┘    └─────────┘

malloc(size):
  1. Search free list for suitable block
  2. If found: remove from free list, return it
  3. If not: call sbrk(size + header_size)
  4. Return pointer to user data

free(ptr):
  1. Add block back to free list
  2. Optionally merge with adjacent free blocks
  3. Usually doesn't call brk() to shrink heap
</code></pre>
<h2 id="2-mmap---memory-mapping">2. mmap() - Memory Mapping</h2>
<h3 id="synopsis_1">Synopsis</h3>
<pre><code class="language-c">#include &lt;sys/mman.h&gt;

void *mmap(void *addr, size_t length, int prot, int flags,
           int fd, off_t offset);
int munmap(void *addr, size_t length);
int msync(void *addr, size_t length, int flags);
int mprotect(void *addr, size_t length, int prot);
</code></pre>
<h3 id="protection-flags">Protection Flags</h3>
<pre><code>PROT_NONE   - Pages cannot be accessed
PROT_READ   - Pages can be read
PROT_WRITE  - Pages can be written
PROT_EXEC   - Pages can be executed

Example: PROT_READ | PROT_WRITE
</code></pre>
<h3 id="mapping-flags">Mapping Flags</h3>
<pre><code>MAP_SHARED     - Share mapping with other processes
               - Changes written to file

MAP_PRIVATE    - Private copy-on-write mapping
               - Changes not written to file

MAP_ANONYMOUS  - Not backed by file (memory only)
MAP_FIXED      - Place mapping at exact address
MAP_LOCKED     - Lock pages in memory (no swap)
</code></pre>
<h3 id="mmap-use-cases">mmap() Use Cases</h3>
<pre><code>1. File Mapping:
┌─────────────────────────────────────────────────┐
│ File on Disk: data.bin (1 MB)                   │
└───────────────────┬─────────────────────────────┘
                    │
              mmap(file_fd)
                    │
                    ▼
┌─────────────────────────────────────────────────┐
│ Process Address Space                           │
│ ┌────────────────────────────────────────────┐  │
│ │ Mapped Region: 0x7f0000000000              │  │
│ │ (can read/write like array)                │  │
│ │ data[0] = 'A';  ← modifies file!           │  │
│ └────────────────────────────────────────────┘  │
└─────────────────────────────────────────────────┘

2. Anonymous Mapping (like malloc for large allocations):
┌─────────────────────────────────────────────────┐
│ mmap(NULL, size, PROT_READ|PROT_WRITE,          │
│      MAP_PRIVATE|MAP_ANONYMOUS, -1, 0)          │
│                                                 │
│ Returns: Large block of zeroed memory           │
│ No file backing                                 │
│ More efficient than brk for large sizes         │
└─────────────────────────────────────────────────┘

3. Shared Memory (IPC):
Process A                          Process B
┌─────────────────────┐           ┌─────────────────────┐
│ mmap(MAP_SHARED)    │           │ mmap(MAP_SHARED)    │
│        │            │           │        │            │
│        └────────────┼───────────┼────────┘            │
└─────────────────────┘           └─────────────────────┘
                     │             │
                     ▼             ▼
              ┌────────────────────────┐
              │   Shared Memory Region │
              │   Both see changes     │
              └────────────────────────┘
</code></pre>
<h3 id="example-file-mapping">Example: File Mapping</h3>
<pre><code class="language-c">#include &lt;sys/mman.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;unistd.h&gt;
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/stat.h&gt;

int main() {
    int fd;
    char *mapped;
    struct stat sb;
    const char *filename = &quot;test_mmap.txt&quot;;

    // Create and write to file
    fd = open(filename, O_RDWR | O_CREAT | O_TRUNC, 0644);
    if (fd == -1) {
        perror(&quot;open&quot;);
        return 1;
    }

    const char *text = &quot;Hello, mmap!\\n&quot;;
    write(fd, text, strlen(text));

    // Get file size
    if (fstat(fd, &amp;sb) == -1) {
        perror(&quot;fstat&quot;);
        return 1;
    }

    // Map file into memory
    mapped = mmap(NULL, sb.st_size, PROT_READ | PROT_WRITE,
                  MAP_SHARED, fd, 0);
    if (mapped == MAP_FAILED) {
        perror(&quot;mmap&quot;);
        return 1;
    }

    printf(&quot;File content: %.*s&quot;, (int)sb.st_size, mapped);

    // Modify through mapping (modifies file!)
    mapped[0] = 'h';  // &quot;Hello&quot; → &quot;hello&quot;

    // Ensure changes are written to disk
    if (msync(mapped, sb.st_size, MS_SYNC) == -1) {
        perror(&quot;msync&quot;);
    }

    // Cleanup
    munmap(mapped, sb.st_size);
    close(fd);

    return 0;
}
</code></pre>
<h3 id="example-anonymous-mapping">Example: Anonymous Mapping</h3>
<pre><code class="language-c">#include &lt;sys/mman.h&gt;
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

int main() {
    size_t size = 4096;  // One page
    char *memory;

    // Allocate anonymous memory
    memory = mmap(NULL, size, 
                  PROT_READ | PROT_WRITE,
                  MAP_PRIVATE | MAP_ANONYMOUS,
                  -1, 0);

    if (memory == MAP_FAILED) {
        perror(&quot;mmap&quot;);
        return 1;
    }

    printf(&quot;Allocated %zu bytes at %p\\n&quot;, size, memory);

    // Use the memory
    strcpy(memory, &quot;Anonymous mapping!&quot;);
    printf(&quot;Content: %s\\n&quot;, memory);

    // Free the memory
    munmap(memory, size);

    return 0;
}
</code></pre>
<h2 id="3-memory-protection---mprotect">3. Memory Protection - mprotect()</h2>
<h3 id="synopsis_2">Synopsis</h3>
<pre><code class="language-c">#include &lt;sys/mman.h&gt;

int mprotect(void *addr, size_t len, int prot);
</code></pre>
<h3 id="protection-example">Protection Example</h3>
<pre><code>Memory Protection Stages:

1. Initial: Read-Write
┌────────────────────────────────┐
│ Memory Region                  │
│ PROT_READ | PROT_WRITE         │
│ char buf[1024];                │
│ buf[0] = 'A';  ✓ OK            │
└────────────────────────────────┘

2. After mprotect(buf, 1024, PROT_READ):
┌────────────────────────────────┐
│ Memory Region                  │
│ PROT_READ (read-only)          │
│ char c = buf[0];  ✓ OK         │
│ buf[0] = 'A';     ✗ SIGSEGV    │
└────────────────────────────────┘

3. After mprotect(buf, 1024, PROT_NONE):
┌────────────────────────────────┐
│ Memory Region                  │
│ PROT_NONE (no access)          │
│ char c = buf[0];  ✗ SIGSEGV    │
│ buf[0] = 'A';     ✗ SIGSEGV    │
└────────────────────────────────┘
</code></pre>
<h3 id="example_1">Example</h3>
<pre><code class="language-c">#include &lt;sys/mman.h&gt;
#include &lt;stdio.h&gt;
#include &lt;signal.h&gt;
#include &lt;string.h&gt;
#include &lt;unistd.h&gt;

void segfault_handler(int sig) {
    printf(&quot;Caught segmentation fault! (expected)\\n&quot;);
    _exit(0);
}

int main() {
    size_t page_size = sysconf(_SC_PAGESIZE);
    char *memory;

    // Set up signal handler
    signal(SIGSEGV, segfault_handler);

    // Allocate memory with read/write
    memory = mmap(NULL, page_size,
                  PROT_READ | PROT_WRITE,
                  MAP_PRIVATE | MAP_ANONYMOUS,
                  -1, 0);

    if (memory == MAP_FAILED) {
        perror(&quot;mmap&quot;);
        return 1;
    }

    // Write to memory (OK)
    strcpy(memory, &quot;Hello&quot;);
    printf(&quot;Wrote: %s\\n&quot;, memory);

    // Change protection to read-only
    if (mprotect(memory, page_size, PROT_READ) == -1) {
        perror(&quot;mprotect&quot;);
        return 1;
    }

    printf(&quot;Changed to read-only. Reading: %s\\n&quot;, memory);

    // Try to write (will cause SIGSEGV)
    printf(&quot;Attempting write to read-only memory...\\n&quot;);
    memory[0] = 'h';  // This will trigger signal handler

    munmap(memory, page_size);
    return 0;
}
</code></pre>
<h2 id="4-shared-memory---posix-and-system-v">4. Shared Memory - POSIX and System V</h2>
<h3 id="system-v-shared-memory">System V Shared Memory</h3>
<pre><code class="language-c">#include &lt;sys/shm.h&gt;

int shmget(key_t key, size_t size, int shmflg);
void *shmat(int shmid, const void *shmaddr, int shmflg);
int shmdt(const void *shmaddr);
int shmctl(int shmid, int cmd, struct shmid_ds *buf);
</code></pre>
<h3 id="shared-memory-architecture">Shared Memory Architecture</h3>
<pre><code>┌─────────────────────────────────────────────────────────┐
│                  KERNEL                                 │
│  ┌───────────────────────────────────────────────────┐  │
│  │  Shared Memory Segment (ID: 12345)                │  │
│  │  Key: 0x1234                                      │  │
│  │  Size: 4096 bytes                                 │  │
│  │  ┌─────────────────────────────────────────────┐  │  │
│  │  │  Data: &quot;Shared between processes&quot;           │  │  │
│  │  └─────────────────────────────────────────────┘  │  │
│  └───────────────────────────────────────────────────┘  │
│                  ▲                    ▲                 │
└──────────────────┼────────────────────┼─────────────────┘
                   │                    │
        ┌──────────┴──────────┐  ┌──────┴─────────────┐
        │ Process A           │  │ Process B          │
        │ attached at:        │  │ attached at:       │
        │ 0x7f0000000000      │  │ 0x7f0000000000     │
        │                     │  │                    │
        │ data[0] = 'H';      │  │ char c = data[0];  │
        │                     │  │ (sees 'H')         │
        └─────────────────────┘  └────────────────────┘
</code></pre>
<h3 id="example-shared-memory">Example: Shared Memory</h3>
<pre><code class="language-c">#include &lt;sys/shm.h&gt;
#include &lt;sys/stat.h&gt;
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;
#include &lt;unistd.h&gt;

#define SHM_SIZE 1024

int main() {
    key_t key = 1234;
    int shmid;
    char *shared_memory;
    pid_t pid;

    // Create shared memory segment
    shmid = shmget(key, SHM_SIZE, IPC_CREAT | 0666);
    if (shmid == -1) {
        perror(&quot;shmget&quot;);
        return 1;
    }

    printf(&quot;Shared memory ID: %d\\n&quot;, shmid);

    // Attach to shared memory
    shared_memory = shmat(shmid, NULL, 0);
    if (shared_memory == (char *)-1) {
        perror(&quot;shmat&quot;);
        return 1;
    }

    pid = fork();

    if (pid == 0) {
        // Child process - write to shared memory
        strcpy(shared_memory, &quot;Hello from child!&quot;);
        printf(&quot;Child wrote: %s\\n&quot;, shared_memory);
        shmdt(shared_memory);
        return 0;
    }
    else {
        // Parent process - read from shared memory
        sleep(1);  // Wait for child to write
        printf(&quot;Parent read: %s\\n&quot;, shared_memory);

        // Cleanup
        shmdt(shared_memory);
        shmctl(shmid, IPC_RMID, NULL);  // Remove segment
    }

    return 0;
}
</code></pre>
<h2 id="5-memory-locking---mlock">5. Memory Locking - mlock()</h2>
<h3 id="synopsis_3">Synopsis</h3>
<pre><code class="language-c">#include &lt;sys/mman.h&gt;

int mlock(const void *addr, size_t len);
int munlock(const void *addr, size_t len);
int mlockall(int flags);
int munlockall(void);
</code></pre>
<h3 id="memory-locking-concept">Memory Locking Concept</h3>
<pre><code>Without mlock():
┌─────────────────────────────────────┐
│ Process Memory                      │
│ ┌─────────────────────────────────┐ │
│ │ Sensitive data (e.g., crypto    │ │
│ │ keys, passwords)                │ │
│ └─────────────────────────────────┘ │
└──────────────┬──────────────────────┘
               │
               │ May be swapped to disk!
               ▼
┌───────────────────────────────────┐
│ Swap File/Partition               │
│ (disk - INSECURE!)                │
│ Sensitive data exposed            │
└───────────────────────────────────┘

With mlock():
┌─────────────────────────────────────┐
│ Physical RAM                        │
│ ┌─────────────────────────────────┐ │
│ │ Locked: Sensitive data          │ │
│ │ (never swapped to disk)         │ │
│ └─────────────────────────────────┘ │
└─────────────────────────────────────┘
         ▲
         │ Stays in RAM
         │ Protected from swap
</code></pre>
<h3 id="example_2">Example</h3>
<pre><code class="language-c">#include &lt;sys/mman.h&gt;
#include &lt;unistd.h&gt;
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

int main() {
    size_t page_size = sysconf(_SC_PAGESIZE);
    char *secure_memory;

    // Allocate memory
    secure_memory = mmap(NULL, page_size,
                         PROT_READ | PROT_WRITE,
                         MAP_PRIVATE | MAP_ANONYMOUS,
                         -1, 0);

    if (secure_memory == MAP_FAILED) {
        perror(&quot;mmap&quot;);
        return 1;
    }

    // Lock memory (prevent swapping)
    if (mlock(secure_memory, page_size) == -1) {
        perror(&quot;mlock (may need root privileges)&quot;);
        // Continue anyway for demo
    } else {
        printf(&quot;Memory locked (won't be swapped)\\n&quot;);
    }

    // Store sensitive data
    strcpy(secure_memory, &quot;SecretPassword123&quot;);
    printf(&quot;Stored sensitive data\\n&quot;);

    // Use the data...

    // Clear before releasing
    memset(secure_memory, 0, page_size);

    // Unlock and free
    munlock(secure_memory, page_size);
    munmap(secure_memory, page_size);

    return 0;
}
</code></pre>
<h2 id="6-memory-advice---madvise">6. Memory Advice - madvise()</h2>

<h2 id="memory-management-best-practices">Memory Management Best Practices</h2>
<pre><code>1. Always check return values
   ✓ if (ptr == NULL) or if (ptr == MAP_FAILED)

2. Match allocation with deallocation
   ✓ brk/sbrk → brk
   ✓ mmap → munmap
   ✓ malloc → free

3. Handle out-of-memory gracefully
   ✓ Check ENOMEM errno
   ✓ Have fallback strategy

4. Be aware of alignment
   ✓ mmap returns page-aligned addresses
   ✓ Some operations require alignment

5. Use appropriate method:
   ✓ Small allocations → malloc (brk)
   ✓ Large allocations → mmap
   ✓ File I/O → mmap for large files
   ✓ IPC → shared memory
</code></pre>
<h2 id="common-pitfalls">Common Pitfalls</h2>
<ol>
<li><strong>Memory leaks</strong> - Not freeing/unmapping memory</li>
<li><strong>Segmentation faults</strong> - Accessing unmapped memory</li>
<li><strong>Alignment issues</strong> - Not aligning to page boundaries</li>
<li><strong>Shared memory cleanup</strong> - Not removing segments</li>
<li><strong>Permission errors</strong> - Incorrect mmap protection flags</li>
<li><strong>Partial writes</strong> - Not handling msync failures</li>
</ol>

<h2 id="overview">Overview</h2>
<p>Process management is fundamental to Unix/Linux systems. This tutorial covers all major system calls for creating, managing, and terminating processes.</p>

<h2 id="1-fork---create-a-new-process">1. fork() - Create a New Process</h2>
<h3 id="synopsis">Synopsis</h3>
<pre><code class="language-c">#include &lt;unistd.h&gt;
pid_t fork(void);
</code></pre>
<h3 id="description">Description</h3>
<p>Creates a new process by duplicating the calling process. The new process (child) is an exact copy of the parent, except:
- Different PID
- Different PPID (parent PID)
- Copy of file descriptors
- Copy of memory (copy-on-write)</p>
<h3 id="return-value">Return Value</h3>
<ul>
<li><strong>Parent process</strong>: Returns child&rsquo;s PID (positive number)</li>
<li><strong>Child process</strong>: Returns 0</li>
<li><strong>Error</strong>: Returns -1</li>
</ul>
<h3 id="memory-layout-after-fork">Memory Layout After fork()</h3>
<pre><code>Before fork():
┌─────────────────────────────────────┐
│  Process (PID: 1000)                │
│  ┌───────────────────────────────┐  │
│  │  Text (Code) Segment          │  │
│  ├───────────────────────────────┤  │
│  │  Data Segment                 │  │
│  │  int x = 10;                  │  │
│  ├───────────────────────────────┤  │
│  │  Heap                         │  │
│  │  (dynamic memory)             │  │
│  ├───────────────────────────────┤  │
│  │  Stack                        │  │
│  │  (local variables)            │  │
│  └───────────────────────────────┘  │
└─────────────────────────────────────┘

After fork():
┌─────────────────────────────────────┐    ┌─────────────────────────────────────┐
│  Parent (PID: 1000)                 │    │  Child (PID: 1001)                  │
│  ┌───────────────────────────────┐  │    │  ┌───────────────────────────────┐  │
│  │  Text (Code) Segment          │◄─┼────┼─►│  Text (Code) Segment (shared) │  │
│  ├───────────────────────────────┤  │    │  ├───────────────────────────────┤  │
│  │  Data Segment                 │  │    │  │  Data Segment (copy)          │  │
│  │  int x = 10;                  │  │    │  │  int x = 10;                  │  │
│  ├───────────────────────────────┤  │    │  ├───────────────────────────────┤  │
│  │  Heap (copy)                  │  │    │  │  Heap (copy)                  │  │
│  ├───────────────────────────────┤  │    │  ├───────────────────────────────┤  │
│  │  Stack (copy)                 │  │    │  │  Stack (copy)                 │  │
│  └───────────────────────────────┘  │    │  └───────────────────────────────┘  │
└─────────────────────────────────────┘    └─────────────────────────────────────┘
</code></pre>
<h3 id="example">Example</h3>
<pre><code class="language-c">#include &lt;stdio.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/types.h&gt;
#include &lt;stdlib.h&gt;

int main() {
    pid_t pid;
    int x = 10;

    printf(&quot;Before fork: PID=%d, x=%d\\n&quot;, getpid(), x);

    pid = fork();

    if (pid &lt; 0) {
        perror(&quot;fork failed&quot;);
        exit(1);
    }
    else if (pid == 0) {
        // Child process
        x = 20;
        printf(&quot;Child:  PID=%d, PPID=%d, x=%d\\n&quot;, getpid(), getppid(), x);
        exit(0);
    }
    else {
        // Parent process
        x = 30;
        printf(&quot;Parent: PID=%d, Child PID=%d, x=%d\\n&quot;, getpid(), pid, x);
        wait(NULL);  // Wait for child to finish

<h3 id="exec-memory-transformation">exec() Memory Transformation</h3>

┌─────────────────────────────┐      ┌─────────────────────────────┐
│ Process (PID: 1001)         │      │ Process (PID: 1001) ← same  │
│ ┌─────────────────────────┐ │      │ ┌─────────────────────────┐ │
│ │ OLD Text Segment        │ │      │ │ NEW Text Segment        │ │
│ │ (original program code) │ │  →   │ │ (new program code)      │ │
│ ├─────────────────────────┤ │      │ ├─────────────────────────┤ │
│ │ OLD Data                │ │      │ │ NEW Data                │ │
│ ├─────────────────────────┤ │      │ ├─────────────────────────┤ │
│ │ OLD Heap                │ │      │ │ NEW Heap                │ │
│ ├─────────────────────────┤ │      │ ├─────────────────────────┤ │
│ │ OLD Stack               │ │      │ │ NEW Stack               │ │
│ └─────────────────────────┘ │      │ └─────────────────────────┘ │
│                             │      │                             │
│ File Descriptors: 0,1,2...  │  →   │ Same FDs (unless FD_CLOEXEC)│
│ PID: 1001                   │      │ PID: 1001                   │

    pid_t pid = fork();

    if (pid == 0) {
        // Child process - replace with 'ls' command
        printf(&quot;Child: About to exec ls\\n&quot;);
        execl(&quot;/bin/ls&quot;, &quot;ls&quot;, &quot;-l&quot;, NULL);

        perror(&quot;exec failed&quot;);

     │                                       │
     │  fork()                               │

     │                                       │
     │                                       │ Running...

<h3 id="status-macros">Status Macros</h3>
<pre><code class="language-c">WIFEXITED(status)    // True if child terminated normally
WEXITSTATUS(status)  // Exit status of child
WIFSIGNALED(status)  // True if child terminated by signal

<h3 id="example_2">Example</h3>
<pre><code class="language-c">#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/wait.h&gt;

int main() {
    pid_t pid = fork();

    if (pid == 0) {
        // Child process
        printf(&quot;Child: PID=%d, sleeping 2 seconds\\n&quot;, getpid());
        sleep(2);
        exit(42);  // Exit with status 42
    }
    else {
        // Parent process
        int status;
        printf(&quot;Parent: Waiting for child %d\\n&quot;, pid);

        pid_t child = wait(&amp;status);

        if (WIFEXITED(status)) {
            printf(&quot;Child %d exited with status %d\\n&quot;, 
                   child, WEXITSTATUS(status));
        }
        else if (WIFSIGNALED(status)) {
            printf(&quot;Child %d killed by signal %d\\n&quot;, 
                   child, WTERMSIG(status));
        }
    }

    return 0;
}
</code></pre>

<h2 id="5-exit-and-_exit---terminate-process">5. exit() and _exit() - Terminate Process</h2>
<h3 id="synopsis_3">Synopsis</h3>
<pre><code class="language-c">#include &lt;stdlib.h&gt;

<h3 id="differences">Differences</h3>
<pre><code>exit() - Library Function                _exit() - System Call
        │                                         │
        ▼                                         ▼
┌─────────────────────┐              ┌─────────────────────┐
│ Flush I/O buffers   │              │ Skip I/O flush      │
│ Call atexit() funcs │              │ Skip atexit()       │
│ Close FILE* streams │              │ Keep streams open   │
└──────────┬──────────┘              └──────────┬──────────┘
           │                                    │
           ▼                                    ▼
        ┌────────────────────────────────────────┐
        │      _exit() system call               │
        │  (Terminate process immediately)       │
        └────────────────────────────────────────┘
</code></pre>
<h3 id="example_3">Example</h3>
<pre><code class="language-c">#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;

void cleanup(void) {
    printf(&quot;Cleanup function called\\n&quot;);
}

int main() {
    atexit(cleanup);

    pid_t pid = fork();

    if (pid == 0) {
        printf(&quot;Child: Using _exit() - &quot;);
        printf(&quot;this may not be fully printed&quot;);
        _exit(0);  // Immediate exit, no flush
    }
    else {
        wait(NULL);
        printf(&quot;Parent: Using exit()\\n&quot;);
        exit(0);   // Calls cleanup(), flushes buffers
    }
}
</code></pre>

int main() {

    current_nice = getpriority(PRIO_PROCESS, 0);

│  │  │  Memory:          45 MB / 100 MB limit       │  │ │
│  │  │  File Descriptors: 15 / 1024 limit           │  │ │
│  │  │  Processes:       3 / 256 limit              │  │ │
│  │  │  Stack Size:      2 MB / 8 MB limit          │  │ │

                            │

                  │                    │
                  ▼                    ▼
        ┌──────────────────┐  ┌──────────────────┐
        │ Soft Limit       │  │ Hard Limit       │

<h2 id="1-getrlimit-and-setrlimit---resource-limits">1. getrlimit() and setrlimit() - Resource Limits</h2>

<pre><code class="language-c">#include &lt;sys/resource.h&gt;

<h3 id="resource-types">Resource Types</h3>
<pre><code>┌──────────────────────────────────────────────────────────┐
│ Resource                Description                      │
├──────────────────────────────────────────────────────────┤

│ RLIMIT_FSIZE        Max file size (bytes)                │

│ RLIMIT_STACK        Max stack size (bytes)               │

│ RLIMIT_RSS          Max resident set size (bytes)        │
│ RLIMIT_NOFILE       Max number of open files             │
│ RLIMIT_AS           Max address space (virtual memory)   │
│ RLIMIT_NPROC        Max number of processes              │

<h3 id="limit-enforcement">Limit Enforcement</h3>
<pre><code>Soft vs Hard Limits:

Soft Limit (rlim_cur):
┌─────────────────────────────────────────┐
│ Current Usage:  ████████░░░░░░░░░░      │
│                 40%                     │
│                                         │
│ Soft Limit:     ─────────────────────►  │
│                 Can be increased by     │
│                 process (up to hard)    │
│                                         │
│ Hard Limit:     ════════════════════►   │
│                 Maximum (needs root)    │
└─────────────────────────────────────────┘

What happens when limit exceeded?
┌──────────────────────────────────────────────────┐
│ RLIMIT_CPU      → SIGXCPU signal sent            │
│ RLIMIT_FSIZE    → SIGXFSZ signal, write fails    │
│ RLIMIT_DATA     → malloc/brk fails               │
│ RLIMIT_STACK    → Stack overflow, SIGSEGV        │
│ RLIMIT_NOFILE   → open() fails with EMFILE       │
│ RLIMIT_NPROC    → fork() fails with EAGAIN       │
└──────────────────────────────────────────────────┘

    print_limit(RLIMIT_STACK, &quot;Stack size&quot;);

    if (getrlimit(RLIMIT_NOFILE, &amp;limit) == -1) {

    if (setrlimit(RLIMIT_NOFILE, &amp;limit) == -1) {

    printf(&quot;CPU time (system):    %ld.%06ld seconds\\n&quot;,

    printf(&quot;Max RSS:              %ld KB\\n&quot;, usage-&gt;ru_maxrss);
    printf(&quot;Page faults (minor):  %ld\\n&quot;, usage-&gt;ru_minflt);
    printf(&quot;Page faults (major):  %ld\\n&quot;, usage-&gt;ru_majflt);
    printf(&quot;Block inputs:         %ld\\n&quot;, usage-&gt;ru_inblock);
    printf(&quot;Block outputs:        %ld\\n&quot;, usage-&gt;ru_oublock);
    printf(&quot;Voluntary switches:   %ld\\n&quot;, usage-&gt;ru_nvcsw);
    printf(&quot;Involuntary switches: %ld\\n&quot;, usage-&gt;ru_nivcsw);
}

int main() {
    struct rusage usage_start, usage_end;

    // Get initial usage
    getrusage(RUSAGE_SELF, &amp;usage_start);

    printf(&quot;Starting work...\\n&quot;);
    do_work();
    printf(&quot;Work completed.\\n\\n&quot;);

    // Get final usage
    getrusage(RUSAGE_SELF, &amp;usage_end);

    printf(&quot;Resource Usage:\\n&quot;);
    printf(&quot;================\\n&quot;);
    print_rusage(&amp;usage_end);

    return 0;
}

<h3 id="struct-tms">struct tms</h3>

    clock_t tms_utime;   // User CPU time of process

<h3 id="example-process-time-measurement">Example: Process Time Measurement</h3>
<pre><code class="language-c">#include &lt;sys/times.h&gt;
#include &lt;unistd.h&gt;
#include &lt;stdio.h&gt;
#include &lt;time.h&gt;

void cpu_intensive_work() {
    long sum = 0;
    for (long i = 0; i &lt; 50000000; i++) {
        sum += i * i;
    }
}

void io_work() {
    FILE *fp = fopen(&quot;/dev/null&quot;, &quot;w&quot;);
    for (int i = 0; i &lt; 10000; i++) {
        fprintf(fp, &quot;Line %d\\n&quot;, i);
    }
    fclose(fp);
}

int main() {
    struct tms start, end;
    clock_t start_real, end_real;
    long ticks_per_sec = sysconf(_SC_CLK_TCK);

    start_real = times(&amp;start);

    printf(&quot;Performing work...\\n&quot;);
    cpu_intensive_work();
    io_work();
    sleep(1);  // Intentional sleep

    end_real = times(&amp;end);

    double real_time = (double)(end_real - start_real) / ticks_per_sec;
    double user_time = (double)(end.tms_utime - start.tms_utime) / ticks_per_sec;
    double sys_time = (double)(end.tms_stime - start.tms_stime) / ticks_per_sec;

    printf(&quot;\\nTime Statistics:\\n&quot;);
    printf(&quot;================\\n&quot;);
    printf(&quot;Real time:   %.2f seconds\\n&quot;, real_time);
    printf(&quot;User time:   %.2f seconds\\n&quot;, user_time);
    printf(&quot;System time: %.2f seconds\\n&quot;, sys_time);
    printf(&quot;CPU time:    %.2f seconds\\n&quot;, user_time + sys_time);
    printf(&quot;CPU usage:   %.1f%%\\n&quot;, 
           100.0 * (user_time + sys_time) / real_time);

    return 0;
}
</code></pre>

<h3 id="example-scheduling">Example: Scheduling</h3>
<pre><code class="language-c">#include &lt;sched.h&gt;
#include &lt;sys/resource.h&gt;
#include &lt;stdio.h&gt;
#include &lt;unistd.h&gt;
#include &lt;errno.h&gt;

const char *policy_name(int policy) {
    switch (policy) {
        case SCHED_OTHER: return &quot;SCHED_OTHER&quot;;
        case SCHED_FIFO:  return &quot;SCHED_FIFO&quot;;
        case SCHED_RR:    return &quot;SCHED_RR&quot;;
        case SCHED_BATCH: return &quot;SCHED_BATCH&quot;;
        case SCHED_IDLE:  return &quot;SCHED_IDLE&quot;;
        default:          return &quot;UNKNOWN&quot;;
    }
}

int main() {
    int policy;
    struct sched_param param;
    int nice_val;

    // Get current scheduling policy
    policy = sched_getscheduler(0);  // 0 = current process
    if (policy == -1) {
        perror(&quot;sched_getscheduler&quot;);
        return 1;
    }

    printf(&quot;Current scheduling policy: %s\\n&quot;, policy_name(policy));

    // Get scheduling parameters
    if (sched_getparam(0, &amp;param) == -1) {
        perror(&quot;sched_getparam&quot;);
        return 1;
    }
    printf(&quot;Priority: %d\\n&quot;, param.sched_priority);

    // Get nice value
    errno = 0;
    nice_val = getpriority(PRIO_PROCESS, 0);
    if (errno != 0) {
        perror(&quot;getpriority&quot;);
    } else {
        printf(&quot;Nice value: %d\\n&quot;, nice_val);
    }

    // Try to set real-time priority (requires root)
    printf(&quot;\\nAttempting to set SCHED_RR (requires root)...\\n&quot;);
    param.sched_priority = 10;
    if (sched_setscheduler(0, SCHED_RR, &amp;param) == -1) {
        printf(&quot;Failed: %s\\n&quot;, strerror(errno));
        printf(&quot;(This is expected without root privileges)\\n&quot;);
    } else {
        printf(&quot;Success! Now using real-time scheduling\\n&quot;);
    }

    // Anyone can decrease priority (increase nice value)
    printf(&quot;\\nIncreasing nice value by 5...\\n&quot;);
    if (nice(5) == -1) {
        perror(&quot;nice&quot;);
    } else {
        nice_val = getpriority(PRIO_PROCESS, 0);
        printf(&quot;New nice value: %d\\n&quot;, nice_val);
    }

    return 0;
}
</code></pre>

<h3 id="example-cpu-affinity">Example: CPU Affinity</h3>
<pre><code class="language-c">#define _GNU_SOURCE
#include &lt;sched.h&gt;
#include &lt;stdio.h&gt;
#include &lt;unistd.h&gt;

int main() {
    cpu_set_t mask;
    int num_cpus = sysconf(_SC_NPROCESSORS_ONLN);

    printf(&quot;System has %d CPUs\\n&quot;, num_cpus);

    // Get current affinity
    CPU_ZERO(&amp;mask);
    if (sched_getaffinity(0, sizeof(mask), &amp;mask) == -1) {
        perror(&quot;sched_getaffinity&quot;);
        return 1;
    }

    printf(&quot;Current affinity: &quot;);
    for (int i = 0; i &lt; num_cpus; i++) {
        if (CPU_ISSET(i, &amp;mask)) {
            printf(&quot;CPU%d &quot;, i);
        }
    }
    printf(&quot;\\n&quot;);

    // Set affinity to CPU 0 only
    CPU_ZERO(&amp;mask);
    CPU_SET(0, &amp;mask);

    if (sched_setaffinity(0, sizeof(mask), &amp;mask) == -1) {
        perror(&quot;sched_setaffinity&quot;);
        return 1;
    }

    printf(&quot;Set affinity to CPU 0\\n&quot;);

    // Verify
    CPU_ZERO(&amp;mask);
    sched_getaffinity(0, sizeof(mask), &amp;mask);

    printf(&quot;New affinity: &quot;);
    for (int i = 0; i &lt; num_cpus; i++) {
        if (CPU_ISSET(i, &amp;mask)) {
            printf(&quot;CPU%d &quot;, i);
        }
    }
    printf(&quot;\\n&quot;);

    return 0;
}

<h2 id="1-tcp-client-server">1. TCP Client-Server</h2>
<h3 id="tcp-server-flow">TCP Server Flow</h3>
<pre><code>┌─────────────────────────────────────────────────┐
│ socket()      - Create socket                   │
│      │                                          │
│      ▼                                          │

│      │                                          │
│      ▼                                          │
│ listen()      - Mark as passive socket          │
│      │                                          │
│      ▼                                          │
│ accept()      - Wait for connection (blocking)  │
│      │                                          │
│      ▼                                          │

<h3 id="tcp-server-example">TCP Server Example</h3>
<pre><code class="language-c">#include &lt;sys/socket.h&gt;
#include &lt;netinet/in.h&gt;
#include &lt;arpa/inet.h&gt;
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;
#include &lt;unistd.h&gt;

#define PORT 8080
#define BACKLOG 5

int main() {
    int server_fd, client_fd;
    struct sockaddr_in server_addr, client_addr;
    socklen_t client_len;
    char buffer[1024];

    // 1. Create socket
    server_fd = socket(AF_INET, SOCK_STREAM, 0);
    if (server_fd == -1) {
        perror(&quot;socket&quot;);
        exit(1);
    }

    // Set socket options
    int opt = 1;
    if (setsockopt(server_fd, SOL_SOCKET, SO_REUSEADDR, 
                   &amp;opt, sizeof(opt)) == -1) {
        perror(&quot;setsockopt&quot;);
    }

    // 2. Bind to address and port
    memset(&amp;server_addr, 0, sizeof(server_addr));
    server_addr.sin_family = AF_INET;
    server_addr.sin_addr.s_addr = INADDR_ANY;  // All interfaces
    server_addr.sin_port = htons(PORT);

    if (bind(server_fd, (struct sockaddr *)&amp;server_addr, 
             sizeof(server_addr)) == -1) {
        perror(&quot;bind&quot;);
        close(server_fd);
        exit(1);
    }

    // 3. Listen for connections
    if (listen(server_fd, BACKLOG) == -1) {
        perror(&quot;listen&quot;);
        close(server_fd);
        exit(1);
    }

    printf(&quot;Server listening on port %d\\n&quot;, PORT);

    // 4. Accept connections
    client_len = sizeof(client_addr);
    client_fd = accept(server_fd, (struct sockaddr *)&amp;client_addr, 
                      &amp;client_len);
    if (client_fd == -1) {
        perror(&quot;accept&quot;);
        close(server_fd);
        exit(1);
    }

    // Get client info
    char client_ip[INET_ADDRSTRLEN];
    inet_ntop(AF_INET, &amp;client_addr.sin_addr, client_ip, sizeof(client_ip));
    printf(&quot;Client connected: %s:%d\\n&quot;, client_ip, 
           ntohs(client_addr.sin_port));

    // 5. Communicate with client
    ssize_t bytes_read = recv(client_fd, buffer, sizeof(buffer) - 1, 0);
    if (bytes_read &gt; 0) {
        buffer[bytes_read] = '\\0';
        printf(&quot;Received: %s\\n&quot;, buffer);

        // Echo back
        send(client_fd, buffer, bytes_read, 0);
    }

    // 6. Close connections
    close(client_fd);
    close(server_fd);

    return 0;
}
</code></pre>
